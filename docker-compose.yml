services:
  fixops:
    image: devopsaico/fixops:latest
    container_name: fixops-enterprise
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - FIXOPS_MODE=enterprise
      - FIXOPS_API_TOKEN=fixops_sk_WIjum9WxuQv8s6vzJeU2gYKximI5WSdMDtshH1U_p0U
      - FIXOPS_JWT_SECRET=d8346832a7fb5307839a8a2a91d6dd357b80773f9b152eb746461a5895eb36f0
      - API_WORKERS=2
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
