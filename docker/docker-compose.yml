# ============================================
# ALdeci CTEM+ Platform — Docker Compose
# ============================================
# One-command demo:     docker compose up
#   (starts API + UI + Dependency-Track + PentAGI)
# With PostgreSQL+Redis: docker compose --profile enterprise up
# Full stack:           docker compose --profile feeds --profile enterprise up
# With sidecars:        docker compose --profile demo up
# ============================================
#
# Database modes:
#   SQLite (default):    docker compose up
#   PostgreSQL:          docker compose --profile enterprise up
#                        (sets FIXOPS_DB_TYPE=postgres automatically)
# ============================================

services:
  # ─── Infrastructure Services (enterprise profile) ──────────

  # PostgreSQL 16 — primary database for enterprise multi-tenant deployment
  postgres:
    image: postgres:16-alpine
    container_name: fixops-postgres
    environment:
      POSTGRES_DB: ${FIXOPS_PG_DB:-fixops}
      POSTGRES_USER: ${FIXOPS_PG_USER:-fixops}
      POSTGRES_PASSWORD: ${FIXOPS_PG_PASSWORD:?FIXOPS_PG_PASSWORD must be set for enterprise profile}
      # Performance tuning for ALdeci workload (JSONB-heavy, write-moderate)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c huge_pages=off
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c log_min_duration_statement=1000
        -c log_lock_waits=on
    volumes:
      - fixops-pg-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${FIXOPS_PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FIXOPS_PG_USER:-fixops} -d ${FIXOPS_PG_DB:-fixops}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    profiles:
      - enterprise
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis 7 — caching layer for feed data, session store, rate limiting
  redis:
    image: redis:7-alpine
    container_name: fixops-redis
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --loglevel warning
        --requirepass ${FIXOPS_REDIS_PASSWORD:-}
    volumes:
      - fixops-redis-data:/data
    ports:
      - "${FIXOPS_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${FIXOPS_REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    profiles:
      - enterprise
    deploy:
      resources:
        limits:
          memory: 384M

  # Alembic migration runner — applies schema migrations before API starts
  # Runs once at deploy time; exits 0 on success.
  alembic-migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${FIXOPS_IMAGE:-fixops:local}
    container_name: fixops-alembic
    environment:
      - FIXOPS_DB_DSN=postgresql://${FIXOPS_PG_USER:-fixops}:${FIXOPS_PG_PASSWORD}@postgres:5432/${FIXOPS_PG_DB:-fixops}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - enterprise

  # ─── Core Services (start by default) ─────────────────────

  # Main ALdeci API Server — CTEM+ Decision Intelligence
  fixops:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${FIXOPS_IMAGE:-fixops:local}
    container_name: fixops-api
    ports:
      - "${FIXOPS_PORT:-8000}:8000"
    environment:
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN must be set}
      - FIXOPS_JWT_SECRET=${FIXOPS_JWT_SECRET:?FIXOPS_JWT_SECRET must be set}
      - FIXOPS_DISABLE_TELEMETRY=1
      - FIXOPS_MODE=enterprise
      - FIXOPS_DISABLE_RATE_LIMIT=${FIXOPS_DISABLE_RATE_LIMIT:-0}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # PostgreSQL — only active when FIXOPS_DB_TYPE=postgres
      - FIXOPS_DB_TYPE=${FIXOPS_DB_TYPE:-sqlite}
      - FIXOPS_DB_DSN=${FIXOPS_DB_DSN:-}
      # Redis — URL used by caching, session, and rate-limit modules
      - FIXOPS_REDIS_URL=${FIXOPS_REDIS_URL:-}
      # Dependency-Track — SBOM analysis backend
      - DTRACK_URL=${DTRACK_URL:-http://dtrack-api:8080}
      - DTRACK_API_KEY=${DTRACK_API_KEY:-}
      # PentAGI — AI pentest engine backend
      - MPTE_BASE_URL=${MPTE_BASE_URL:-https://pentagi:8443}
    volumes:
      - fixops-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # ALdeci API Server — Enterprise profile wires PostgreSQL + Redis
  # This service override is merged with the base fixops service when
  # --profile enterprise is used.
  fixops-enterprise:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${FIXOPS_IMAGE:-fixops:local}
    container_name: fixops-api
    ports:
      - "${FIXOPS_PORT:-8000}:8000"
    environment:
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN must be set}
      - FIXOPS_JWT_SECRET=${FIXOPS_JWT_SECRET:?FIXOPS_JWT_SECRET must be set}
      - FIXOPS_DISABLE_TELEMETRY=1
      - FIXOPS_MODE=enterprise
      - FIXOPS_DISABLE_RATE_LIMIT=${FIXOPS_DISABLE_RATE_LIMIT:-0}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # PostgreSQL backend — enabled via FIXOPS_DB_TYPE=postgres
      - FIXOPS_DB_TYPE=postgres
      - FIXOPS_DB_DSN=postgresql://${FIXOPS_PG_USER:-fixops}:${FIXOPS_PG_PASSWORD}@postgres:5432/${FIXOPS_PG_DB:-fixops}
      # Redis — constructed from service name and optional password
      - FIXOPS_REDIS_URL=redis://:${FIXOPS_REDIS_PASSWORD:-}@redis:6379/0
    volumes:
      - fixops-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      alembic-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    profiles:
      - enterprise
    deploy:
      resources:
        limits:
          memory: 4G

  # ALdeci React UI (Vite + nginx) — proxies /api/* to backend
  aldeci-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.aldeci-ui
    image: ${ALDECI_UI_IMAGE:-aldeci-ui:local}
    container_name: aldeci-ui
    ports:
      - "${ALDECI_UI_PORT:-3001}:3001"
    depends_on:
      fixops:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ─── Profile-gated services (not started by default) ──────

  # Real-Time Feed Sidecar — fetches CVE/KEV/EPSS feeds
  fixops-feeds:
    build:
      context: ..
      dockerfile: docker/Dockerfile.feeds-sidecar
    container_name: fixops-feeds
    depends_on:
      fixops:
        condition: service_healthy
    environment:
      - FIXOPS_BASE_URL=http://fixops:8000
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN must be set}
    command: ["python", "feed_sidecar.py", "continuous", "--interval", "3600"]
    restart: on-failure
    profiles:
      - feeds

  # Interactive Demo Sidecar
  fixops-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo-sidecar
    container_name: fixops-demo
    depends_on:
      fixops:
        condition: service_healthy
    environment:
      - FIXOPS_BASE_URL=http://fixops:8000
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN must be set}
    profiles:
      - demo

  # Smoke Test Sidecar
  fixops-smoke:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo-sidecar
    container_name: fixops-smoke
    depends_on:
      fixops:
        condition: service_healthy
    environment:
      - FIXOPS_BASE_URL=http://fixops:8000
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN must be set}
    command: ["pytest", "-v", "-s", "tests/sidecar/"]
    profiles:
      - test

  # Micro Penetration Test Sidecar
  fixops-micropentest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo-sidecar
    container_name: fixops-micropentest
    depends_on:
      fixops:
        condition: service_healthy
    environment:
      - FIXOPS_BASE_URL=http://fixops:8000
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN must be set}
    command: ["python", "scripts/micropentest_sidecar.py", "run"]
    profiles:
      - pentest

  # ─── Dependency-Track (SBOM Analysis — default) ─────────────
  # OWASP Dependency-Track: industry-standard SBOM lifecycle management.
  # Handles CycloneDX/SPDX parsing, continuous CVE monitoring, license compliance.
  # FixOps acts as the decision/orchestration layer on top.
  #   UI:     http://localhost:8081  (admin/admin on first run)
  #   API:    http://dtrack-api:8080/api/v1/

  dtrack-api:
    image: dependencytrack/apiserver:4.12.3
    container_name: fixops-dtrack-api
    environment:
      # Use embedded H2 by default; switch to Postgres for production
      - ALPINE_DATABASE_MODE=${DTRACK_DB_MODE:-external}
      - ALPINE_DATABASE_URL=jdbc:postgresql://postgres:5432/${FIXOPS_PG_DB:-fixops}
      - ALPINE_DATABASE_DRIVER=org.postgresql.Driver
      - ALPINE_DATABASE_USERNAME=${FIXOPS_PG_USER:-fixops}
      - ALPINE_DATABASE_PASSWORD=${FIXOPS_PG_PASSWORD:-fixops}
      # Data directory inside container
      - ALPINE_DATA_DIRECTORY=/data
      # CORS — allow FixOps API and UI to call DTrack
      - ALPINE_CORS_ENABLED=true
      - ALPINE_CORS_ALLOW_ORIGIN=*
    volumes:
      - dtrack-data:/data
    ports:
      - "${DTRACK_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  dtrack-frontend:
    image: dependencytrack/frontend:4.12.3
    container_name: fixops-dtrack-ui
    environment:
      - API_BASE_URL=http://localhost:${DTRACK_API_PORT:-8080}
    ports:
      - "${DTRACK_UI_PORT:-8081}:8080"
    depends_on:
      dtrack-api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── PentAGI (AI Penetration Testing Engine — default) ─────
  # VXControl PentAGI: autonomous AI-driven pentest agent.
  # FixOps MPTE uses this as its primary external scanning backend.
  # When unavailable, falls back to built-in RealVulnerabilityScanner.
  #   API:    http://pentagi:8443

  pentagi:
    image: vxcontrol/pentagi:latest
    container_name: fixops-pentagi
    environment:
      - PENTAGI_HOST=0.0.0.0
      - PENTAGI_PORT=8443
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "${PENTAGI_PORT:-8443}:8443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  fixops-data:
  fixops-pg-data:
    driver: local
  fixops-redis-data:
    driver: local
  dtrack-data:
    driver: local
