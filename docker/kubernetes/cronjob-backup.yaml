apiVersion: batch/v1
kind: CronJob
metadata:
  name: aldeci-backup
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci-backup
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/part-of: aldeci-platform
  annotations:
    description: "Daily backup of ALDECI SQLite databases and evidence files"
spec:
  # Run daily at 02:00 UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: aldeci-backup
            app.kubernetes.io/component: cronjob
            app.kubernetes.io/part-of: aldeci-platform
        spec:
          serviceAccountName: aldeci-cronjob
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: aldeci/suite-api:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_DIR="/backups/${TIMESTAMP}"
                  mkdir -p "${BACKUP_DIR}"
                  echo "[backup] Starting backup at ${TIMESTAMP}"

                  # Backup all SQLite databases
                  for db in /data/*.db; do
                    [ -f "$db" ] || continue
                    name=$(basename "$db")
                    echo "[backup] Copying $name"
                    cp "$db" "${BACKUP_DIR}/${name}"
                  done

                  # Backup evidence directory
                  if [ -d /data/evidence ]; then
                    echo "[backup] Archiving evidence/"
                    tar -czf "${BACKUP_DIR}/evidence.tar.gz" -C /data evidence/
                  fi

                  # Backup knowledge graph
                  if [ -d /data/knowledge ]; then
                    echo "[backup] Archiving knowledge/"
                    tar -czf "${BACKUP_DIR}/knowledge.tar.gz" -C /data knowledge/
                  fi

                  # Prune backups older than BACKUP_RETENTION_DAYS
                  RETENTION="${BACKUP_RETENTION_DAYS:-30}"
                  echo "[backup] Pruning backups older than ${RETENTION} days"
                  find /backups -maxdepth 1 -type d -mtime "+${RETENTION}" -exec rm -rf {} + 2>/dev/null || true

                  echo "[backup] Completed successfully: ${BACKUP_DIR}"
              envFrom:
                - configMapRef:
                    name: aldeci-config
                - secretRef:
                    name: aldeci-secrets
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: backups
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: aldeci-data
                readOnly: true
            - name: backups
              persistentVolumeClaim:
                claimName: aldeci-backups
            - name: tmp
              emptyDir: {}
