apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: aldeci-base

# Base namespace applied to all resources
namespace: aldeci

# All base manifests
resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - secrets.yaml
  - pvc.yaml
  - api-deployment.yaml
  - api-service.yaml
  - ui-deployment.yaml
  - ui-service.yaml
  - ingress.yaml
  - hpa.yaml
  - networkpolicy.yaml
  - cronjob-backup.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: aldeci-platform

# Common annotations
commonAnnotations:
  managed-by: "kustomize"
  platform: "aldeci"
  contact: "info@devopsai.co"

# Image tags — override in environment overlays
images:
  - name: aldeci/suite-api
    newTag: latest
  - name: aldeci/suite-ui
    newTag: latest
