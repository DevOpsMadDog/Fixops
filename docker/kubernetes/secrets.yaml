# ALDECI Secrets Template
# -----------------------------------------------------------------------
# DO NOT commit real values to git. This file contains only placeholder
# values. Before deploying, replace all <CHANGE_ME> values with real
# secrets, or use an external secrets manager (Vault, AWS Secrets Manager,
# Sealed Secrets, External Secrets Operator).
#
# Generate secrets:
#   JWT secret:  openssl rand -base64 48
#   API token:   openssl rand -hex 32
#   Encryption:  openssl rand -base64 32
#
# Values must be base64-encoded:
#   echo -n "my-secret" | base64
# -----------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: aldeci-secrets
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci
    app.kubernetes.io/part-of: aldeci-platform
  annotations:
    # Remove this annotation after populating real values
    warning: "TEMPLATE ONLY — replace all CHANGE_ME values before deploying"
type: Opaque
data:
  # JWT signing secret — openssl rand -base64 48 | base64
  FIXOPS_JWT_SECRET: "CHANGE_ME_base64_encoded"

  # Internal API token for service-to-service auth — openssl rand -hex 32 | base64
  FIXOPS_API_TOKEN: "CHANGE_ME_base64_encoded"

  # Data-at-rest encryption key — openssl rand -base64 32 | base64
  FIXOPS_ENCRYPTION_KEY: "CHANGE_ME_base64_encoded"

  # OpenRouter API key (LLM Council) — base64 encoded
  OPENROUTER_API_KEY: "CHANGE_ME_base64_encoded"

  # OpenAI API key (optional fallback) — base64 encoded
  OPENAI_API_KEY: "CHANGE_ME_base64_encoded"

  # Anthropic API key (Opus escalation) — base64 encoded
  ANTHROPIC_API_KEY: "CHANGE_ME_base64_encoded"

  # Redis password — openssl rand -hex 16 | base64
  REDIS_PASSWORD: "CHANGE_ME_base64_encoded"

  # PostgreSQL password (if using PG backend) — base64 encoded
  POSTGRES_PASSWORD: "CHANGE_ME_base64_encoded"

  # SSO / SAML / OIDC client secret — base64 encoded
  SSO_CLIENT_SECRET: "CHANGE_ME_base64_encoded"

  # Webhook HMAC signing secret — openssl rand -hex 32 | base64
  WEBHOOK_SECRET: "CHANGE_ME_base64_encoded"
