apiVersion: apps/v1
kind: Deployment
metadata:
  name: aldeci-ui
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: aldeci-platform
    app.kubernetes.io/version: "latest"
  annotations:
    description: "ALDECI React 19 UI served via nginx"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aldeci-ui
      app.kubernetes.io/component: ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aldeci-ui
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: aldeci-platform
    spec:
      serviceAccountName: aldeci-ui
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aldeci-ui
                topologyKey: kubernetes.io/hostname
      containers:
        - name: aldeci-ui
          image: aldeci/suite-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: aldeci-config
                  key: FIXOPS_ALLOWED_ORIGINS
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
