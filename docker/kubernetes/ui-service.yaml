apiVersion: v1
kind: Service
metadata:
  name: aldeci-ui
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: aldeci-platform
  annotations:
    description: "ClusterIP service for ALDECI UI nginx pods"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aldeci-ui
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
