apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aldeci-ingress
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci
    app.kubernetes.io/part-of: aldeci-platform
  annotations:
    # Ingress class
    kubernetes.io/ingress.class: "nginx"

    # TLS / HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting — 100 req/min per IP
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://aldeci.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-API-Key, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"

    # Body size for evidence uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

    # Security headers via server-snippet
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

    # WebSocket / SSE support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aldeci.example.com
      secretName: aldeci-tls
  rules:
    # UI — serve React SPA
    - host: aldeci.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aldeci-ui
                port:
                  name: http

    # API — direct API access subdomain
    - host: api.aldeci.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aldeci-api
                port:
                  name: http
