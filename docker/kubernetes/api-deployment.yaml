apiVersion: apps/v1
kind: Deployment
metadata:
  name: aldeci-api
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aldeci-platform
    app.kubernetes.io/version: "latest"
  annotations:
    description: "ALDECI FastAPI gateway — 771 endpoints across 64 routers"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: aldeci-api
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aldeci-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: aldeci-platform
      annotations:
        # Force pod restart when configmap/secret changes
        checksum/config: "placeholder-updated-by-helm-or-kustomize"
    spec:
      serviceAccountName: aldeci-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aldeci-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: aldeci-api
          image: aldeci/suite-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: aldeci-config
            - secretRef:
                name: aldeci-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: aldeci-data
        - name: tmp
          emptyDir: {}
        - name: logs
          persistentVolumeClaim:
            claimName: aldeci-logs
