apiVersion: v1
kind: Service
metadata:
  name: aldeci-api
  namespace: aldeci
  labels:
    app.kubernetes.io/name: aldeci-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: aldeci-platform
  annotations:
    description: "ClusterIP service for ALDECI API pods"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: aldeci-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
  sessionAffinity: None
