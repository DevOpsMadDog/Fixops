{{- if .Values.secrets.create }}
# DO NOT commit real secret values to git.
# Use helm install --set secrets.jwtSecret=... or an external secrets manager.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aldeci.secretName" . }}
  namespace: {{ include "aldeci.namespace" . }}
  labels:
    {{- include "aldeci.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  FIXOPS_JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  FIXOPS_API_TOKEN: {{ .Values.secrets.apiToken | b64enc | quote }}
  FIXOPS_ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | b64enc | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | b64enc | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  SSO_CLIENT_SECRET: {{ .Values.secrets.ssoClientSecret | b64enc | quote }}
  WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | b64enc | quote }}
{{- end }}
