apiVersion: v1
kind: Service
metadata:
  name: {{ include "aldeci.fullname" . }}-ui
  namespace: {{ include "aldeci.namespace" . }}
  labels:
    {{- include "aldeci.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  annotations:
    description: "ClusterIP service for ALDECI UI nginx pods"
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    {{- include "aldeci.ui.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
  sessionAffinity: None
