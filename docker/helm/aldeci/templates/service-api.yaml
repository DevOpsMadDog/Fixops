apiVersion: v1
kind: Service
metadata:
  name: {{ include "aldeci.fullname" . }}-api
  namespace: {{ include "aldeci.namespace" . }}
  labels:
    {{- include "aldeci.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    description: "ClusterIP service for ALDECI API pods"
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "aldeci.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  sessionAffinity: None
