  # ── TIER-1 CRITICAL: compliance ───────────────────────────────────────────

  - path: ${FIXOPS_DATA_DIR:-.}/data/compliance_planner.db
    replicas:
      - name: local-compliance-planner
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/compliance_planner
        retention: 72h
        snapshot-interval: 1h
        sync-interval: 1s

  - path: ${FIXOPS_DATA_DIR:-.}/data/compliance_automation.db
    replicas:
      - name: local-compliance-automation
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/compliance_automation
        retention: 72h
        snapshot-interval: 1h
        sync-interval: 1s

  - path: ${FIXOPS_DATA_DIR:-.}/.fixops_data/compliance.db
