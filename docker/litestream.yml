# Litestream WAL streaming replication config for ALDECI / FixOps
# REQ-008-01: covers critical SQLite DBs; replica target configurable via env.
#
# Default replica target: local file directory (air-gap safe, REQ-008-05).
# Override targets via environment variables:
#   FIXOPS_REPLICA_PATH   — local filesystem replica base dir
#                           (default: ./data/replicas)
#   FIXOPS_S3_BUCKET      — optional S3 bucket name (enables s3 replica)
#   FIXOPS_S3_ENDPOINT    — optional S3-compatible endpoint (MinIO, etc.)
#   FIXOPS_S3_REGION      — AWS region (default: us-east-1)
#   FIXOPS_S3_ACCESS_KEY  — S3 access key (never commit real values)
#   FIXOPS_S3_SECRET_KEY  — S3 secret key (never commit real values)
#
# Run with:
#   litestream replicate -config docker/litestream.yml
#
# Restore example (see scripts/restore_runbook.md for full steps):
#   litestream restore -config docker/litestream.yml -db findings \
#       /path/to/restored/security_findings_engine.db

dbs:
  # ── TIER-1 CRITICAL: findings + brain (highest loss impact) ──────────────

  - path: ${FIXOPS_DATA_DIR:-.}/security_findings_engine.db
    replicas:
      - name: local-findings
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/security_findings_engine
        retention: 72h
        snapshot-interval: 1h
        sync-interval: 1s

  - path: ${FIXOPS_DATA_DIR:-.}/data/fixops_brain.db
    replicas:
      - name: local-brain
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/fixops_brain
        retention: 72h
        snapshot-interval: 1h
        sync-interval: 1s

  - path: ${FIXOPS_DATA_DIR:-.}/fixops_brain.db
    replicas:
      - name: local-brain-root
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/fixops_brain_root
        retention: 72h
        snapshot-interval: 1h
        sync-interval: 1s

  # ── TIER-1 CRITICAL: auth + API keys ─────────────────────────────────────

  - path: ${FIXOPS_DATA_DIR:-.}/data/auth.db
    replicas:
      - name: local-auth
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/auth
        retention: 72h
        snapshot-interval: 30m
        sync-interval: 1s

  - path: ${FIXOPS_DATA_DIR:-.}/.fixops_data/api_keys.db
    replicas:
      - name: local-api-keys
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/api_keys
        retention: 72h
        snapshot-interval: 30m
        sync-interval: 1s

  # ── TIER-1 CRITICAL: evidence chain + vault ───────────────────────────────

  - path: ${FIXOPS_DATA_DIR:-.}/data/evidence_chain.db
    replicas:
      - name: local-evidence-chain
        type: file
        path: ${FIXOPS_REPLICA_PATH:-./data/replicas}/evidence_chain
