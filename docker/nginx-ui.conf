# ============================================
# ALdeci UI — Nginx config
# Serves the React 19 SPA and proxies API
# calls to the backend aldeci service.
# ============================================

# Rate limiting: 10 req/s per IP, burst 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip ─────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Security headers ──────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options     "nosniff"                        always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection           "1; mode=block"                  always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy → aldeci backend ────────────
    # Docker Compose service name "aldeci" resolves via internal DNS
    location /api/ {
        limit_req           zone=api_limit burst=20 nodelay;
        proxy_pass          http://aldeci:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── SSE (MCP Server-Sent Events) ─────────
    location /api/v1/mcp-protocol/sse {
        proxy_pass          http://aldeci:8000;
        proxy_http_version  1.1;
        proxy_set_header    Host      $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    Connection "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
        chunked_transfer_encoding off;
    }

    # ── WebSocket ─────────────────────────────
    location /ws/ {
        proxy_pass          http://aldeci:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400s;
    }

    # ── Pass-through routes ───────────────────
    location /health {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /docs {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /redoc {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /evidence/ {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /graph/ {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /inputs/ {
        proxy_pass         http://aldeci:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets (Vite hashed filenames) ─
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Nginx self-health ─────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
