# ============================================================================
# ALDECI HA — Nginx Load Balancer Configuration
# ============================================================================
# Routes traffic across 2 API replicas with active health checks.
# Serves UI static assets with SPA fallback.
# Provides /healthz, /readyz, /startupz probe endpoints.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr rt=$request_time '
                    'uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 100m;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml
        application/wasm;

    # ── Rate limiting ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: API replicas ───────────────────────────────────────────
    upstream aldeci_api {
        least_conn;

        server aldeci-api-1:8000 max_fails=3 fail_timeout=30s;
        server aldeci-api-2:8000 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # ── Upstream: UI ─────────────────────────────────────────────────────
    upstream aldeci_ui {
        server aldeci-ui:80;
        keepalive 16;
    }

    # ── Main server ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security headers (OWASP) ────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health check endpoints (no auth, no rate limit) ─────────────
        # /healthz — basic liveness: nginx is up, at least 1 backend alive
        location = /healthz {
            access_log off;
            proxy_pass http://aldeci_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # /readyz — readiness: backend + redis + DB all responsive
        location = /readyz {
            access_log off;
            proxy_pass http://aldeci_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 5s;
        }

        # /startupz — startup probe: backend started accepting requests
        location = /startupz {
            access_log off;
            proxy_pass http://aldeci_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # /nginx-health — nginx itself is alive (no upstream dependency)
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-lb"}\n';
            add_header Content-Type application/json;
        }

        # ── API endpoints ────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;

            # Retry on connection failures (not on HTTP errors)
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_timeout 10s;
            proxy_next_upstream_tries 2;
        }

        # ── Auth endpoints (stricter rate limit) ─────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Prometheus metrics ───────────────────────────────────────────
        location /metrics {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_read_timeout 10s;
        }

        # ── WebSocket (sticky to one upstream) ───────────────────────────
        location /ws/ {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── MCP SSE (long-lived connections) ─────────────────────────────
        location /api/v1/mcp-protocol/sse {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding off;
        }

        # ── GraphQL ──────────────────────────────────────────────────────
        location /graphql {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # ── OpenAPI docs ─────────────────────────────────────────────────
        location /docs {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /openapi.json {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /redoc {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # ── Backend health (direct) ─────────────────────────────────────
        location /health {
            proxy_pass http://aldeci_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # ── UI — SPA fallback ────────────────────────────────────────────
        location / {
            proxy_pass http://aldeci_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }

    # ── Status page (internal monitoring only) ───────────────────────────
    server {
        listen 8080;
        server_name _;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.28.0.0/16;
            deny all;
        }
    }
}
