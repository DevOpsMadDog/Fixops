# ============================================
# ALDECI Connector Stack — Supplemental Compose
# ============================================
# Usage: docker compose -f docker-compose.yml -f docker/docker-compose.connectors.yml up
#
# This file adds n8n (orchestration) + DefectDojo (scanner parser) to ALDECI.
# All services register with ALDECI service discovery via labels.
# ============================================

services:
  # ──────────────────────────────────────────────────────────────────────────
  # n8n — Workflow Orchestration (400+ integrations)
  # ──────────────────────────────────────────────────────────────────────────
  # Role: Orchestrates data flows between connectors (Jira, GitHub, Slack, etc.)
  # and ALDECI. Triggers periodic pulls, transforms findings, routes to external systems.
  n8n:
    image: n8nio/n8n:latest
    container_name: aldeci-n8n-orchestrator
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # Encryption key for workflow data (required for production)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-your-secure-key-change-in-prod}
      # Webhook URL for receiving callbacks from external systems
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      # Disable anonymous telemetry
      - N8N_DIAGNOSTICS_ENABLED=false
      # Use secure cookies (HTTPS in production)
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-true}
      # Use filesystem for large binary data (not in-memory)
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      # Enable n8n runners for distributed execution
      - N8N_RUNNERS_ENABLED=true
      # Persist credentials securely
      - N8N_DB_TYPE=sqlite
      - N8N_DB_SQLITE_DB=/home/node/data/database.sqlite
    volumes:
      # Main data volume for workflows, credentials, execution history
      - n8n-data:/home/node/.n8n
      # Read-only mount for workflow templates
      - ./n8n-workflows:/home/node/workflows:ro
    depends_on: []
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "aldeci.service=connector"
      - "aldeci.connector=n8n"
      - "aldeci.discovery=enabled"
      - "aldeci.role=orchestrator"

  # ──────────────────────────────────────────────────────────────────────────
  # dd-postgres — DefectDojo Database (PostgreSQL 15 Alpine)
  # ──────────────────────────────────────────────────────────────────────────
  # Role: Persistent store for DefectDojo scanner metadata and parsing state.
  # Required for defectdojo-api and dd-celery.
  dd-postgres:
    image: postgres:15-alpine
    container_name: aldeci-dd-postgres
    environment:
      # Database name for DefectDojo
      - POSTGRES_DB=${DD_DB_NAME:-defectdojo}
      # Database user
      - POSTGRES_USER=${DD_DB_USER:-dd}
      # Database password (CHANGE IN PRODUCTION)
      - POSTGRES_PASSWORD=${DD_DB_PASSWORD:-defectdojo_pw_change_me}
    volumes:
      # Persistent volume for database files
      - dd-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DD_DB_USER:-dd} -d ${DD_DB_NAME:-defectdojo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "aldeci.service=connector"
      - "aldeci.connector=defectdojo"
      - "aldeci.role=database"

  # ──────────────────────────────────────────────────────────────────────────
  # dd-redis — DefectDojo Celery Broker (Redis 7 Alpine)
  # ──────────────────────────────────────────────────────────────────────────
  # Role: Message queue and result backend for async DefectDojo parsing jobs.
  # Enables parallel scanner file processing without blocking HTTP requests.
  dd-redis:
    image: redis:7-alpine
    container_name: aldeci-dd-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    labels:
      - "aldeci.service=connector"
      - "aldeci.connector=defectdojo"
      - "aldeci.role=cache"

  # ──────────────────────────────────────────────────────────────────────────
  # defectdojo-api — Scanner Parser (Django + DRF API)
  # ──────────────────────────────────────────────────────────────────────────
  # Role: Parses 200+ scanner formats (SARIF, JSON, XML) into normalized findings.
  # Parser-only mode: disables notifications, social auth, web UI. API-only.
  # Accessible at /api/v2/ and /api/v1/ endpoints.
  defectdojo-api:
    image: defectdojo/defectdojo-django:latest
    container_name: aldeci-defectdojo-api
    ports:
      - "${DEFECTDOJO_API_PORT:-8083}:8080"
    environment:
      # PostgreSQL connection string
      - DD_DATABASE_URL=postgresql://${DD_DB_USER:-dd}:${DD_DB_PASSWORD:-defectdojo_pw_change_me}@dd-postgres:5432/${DD_DB_NAME:-defectdojo}
      # Django secret key (CHANGE IN PRODUCTION)
      - DD_SECRET_KEY=${DD_SECRET_KEY:-your-secret-key-change-in-prod}
      # Parser-only mode: disable notifications
      - DD_DISABLE_NOTIFICATIONS=true
      # Parser-only mode: hide social auth forms
      - DD_SOCIAL_AUTH_SHOW_LOGIN_FORM=false
      # Celery broker for async parsing
      - DD_CELERY_BROKER_URL=redis://dd-redis:6379/0
      # Celery result backend
      - DD_CELERY_RESULT_BACKEND=redis://dd-redis:6379/0
      # Allow localhost for API (configure CORS as needed)
      - DD_ALLOWED_HOSTS=localhost,defectdojo-api,127.0.0.1
      # Django settings module
      - DJANGO_SETTINGS_MODULE=dojo.settings.docker_compose
    depends_on:
      dd-postgres:
        condition: service_healthy
      dd-redis:
        condition: service_healthy
    healthcheck:
      # Health check: attempt to fetch user contact infos (returns 401 if unauthenticated, but proves API is up)
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:8080/api/v2/user_contact_infos/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    labels:
      - "aldeci.service=connector"
      - "aldeci.connector=defectdojo"
      - "aldeci.discovery=enabled"
      - "aldeci.role=parser"

  # ──────────────────────────────────────────────────────────────────────────
  # dd-celery — DefectDojo Background Worker
  # ──────────────────────────────────────────────────────────────────────────
  # Role: Async worker for parsing scanner output files (JSON, XML, SARIF, etc.)
  # Runs in dedicated containers to avoid blocking the main API.
  # Concurrency: 2 workers (adjust based on CPU cores and expected throughput).
  dd-celery:
    image: defectdojo/defectdojo-django:latest
    container_name: aldeci-dd-celery-worker
    command: celery -A dojo worker -l info --concurrency 2 --without-gossip --without-mingle --without-heartbeat
    environment:
      # PostgreSQL connection string (same as defectdojo-api)
      - DD_DATABASE_URL=postgresql://${DD_DB_USER:-dd}:${DD_DB_PASSWORD:-defectdojo_pw_change_me}@dd-postgres:5432/${DD_DB_NAME:-defectdojo}
      # Django secret key (must match defectdojo-api)
      - DD_SECRET_KEY=${DD_SECRET_KEY:-your-secret-key-change-in-prod}
      # Celery broker
      - DD_CELERY_BROKER_URL=redis://dd-redis:6379/0
      # Celery result backend
      - DD_CELERY_RESULT_BACKEND=redis://dd-redis:6379/0
      # Parser-only mode
      - DD_DISABLE_NOTIFICATIONS=true
      - DD_SOCIAL_AUTH_SHOW_LOGIN_FORM=false
      # Django settings module
      - DJANGO_SETTINGS_MODULE=dojo.settings.docker_compose
    depends_on:
      defectdojo-api:
        condition: service_healthy
      dd-postgres:
        condition: service_healthy
      dd-redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    labels:
      - "aldeci.service=connector"
      - "aldeci.connector=defectdojo"
      - "aldeci.role=worker"

# ──────────────────────────────────────────────────────────────────────────
# Named Volumes
# ──────────────────────────────────────────────────────────────────────────
volumes:
  # n8n workflow storage, credentials, and execution history
  n8n-data:
  # DefectDojo PostgreSQL data
  dd-pgdata:
