# ============================================================================
# ALDECI HA Production Stack — High Availability Deployment
# ============================================================================
# Enterprise-grade HA setup with:
#   - 2 ALDECI API replicas behind nginx load balancer
#   - PostgreSQL primary + streaming replica (future migration from SQLite)
#   - Redis with AOF persistence for caching, sessions, rate limiting
#   - Nginx reverse proxy with active health checks
#   - Shared NFS-style volume for SQLite DBs (interim)
#   - React UI served via nginx with SPA fallback
#
# Usage:
#   cp docker/enterprise.env.example docker/.env
#   # Fill in FIXOPS_API_TOKEN, FIXOPS_JWT_SECRET, POSTGRES_PASSWORD
#   docker compose -f docker/docker-compose.ha.yml up -d
#   docker compose -f docker/docker-compose.ha.yml up -d --build   # rebuild
#   docker compose -f docker/docker-compose.ha.yml down             # stop
#   docker compose -f docker/docker-compose.ha.yml down -v          # wipe
#
# Access:
#   Platform  →  http://localhost (nginx LB)
#   API direct → http://localhost:8000 (replica 1), :8001 (replica 2)
#   PG primary → localhost:5432
#   PG replica → localhost:5433
#   Redis      → localhost:6379
#
# Health checks:
#   curl http://localhost/healthz      # nginx → backend health
#   curl http://localhost/readyz       # readiness (all deps)
#   curl http://localhost/startupz     # startup probe
#
# Secrets (required in .env or environment):
#   FIXOPS_API_TOKEN    — API bearer token
#   FIXOPS_JWT_SECRET   — JWT signing secret
#   POSTGRES_PASSWORD   — PostgreSQL superuser password
#   POSTGRES_REPL_PASSWORD — Replication user password
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

x-aldeci-env: &aldeci-env
  FIXOPS_MODE: "${FIXOPS_MODE:-production}"
  FIXOPS_API_TOKEN: "${FIXOPS_API_TOKEN:?FIXOPS_API_TOKEN is required}"
  FIXOPS_JWT_SECRET: "${FIXOPS_JWT_SECRET:?FIXOPS_JWT_SECRET is required}"
  FIXOPS_DATA_DIR: "/app/data"
  FIXOPS_LOG_LEVEL: "${FIXOPS_LOG_LEVEL:-warning}"
  FIXOPS_DISABLE_TELEMETRY: "1"
  FIXOPS_SQLITE_DIR: "/app/data"
  REDIS_URL: "redis://redis:6379/0"
  FIXOPS_REDIS_URL: "redis://redis:6379/0"
  FIXOPS_CACHE_URL: "redis://redis:6379/0"
  PYTHONUNBUFFERED: "1"
  # PostgreSQL (future migration target)
  POSTGRES_HOST: "pg-primary"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "${POSTGRES_DB:-aldeci}"
  POSTGRES_USER: "${POSTGRES_USER:-aldeci}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
  DATABASE_URL: "postgresql://${POSTGRES_USER:-aldeci}:${POSTGRES_PASSWORD:-changeme}@pg-primary:5432/${POSTGRES_DB:-aldeci}"
  # LLM providers (optional)
  OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

services:

  # ──────────────────────────────────────────────────────────────────────────
  # nginx — Reverse proxy / load balancer
  # ──────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: aldeci-ha-nginx
    <<: *default-restart
    depends_on:
      aldeci-api-1:
        condition: service_healthy
      aldeci-api-2:
        condition: service_healthy
      aldeci-ui:
        condition: service_healthy
    ports:
      - "${LB_PORT:-80}:80"
      - "${LB_TLS_PORT:-443}:443"
    volumes:
      - ./nginx-ha.conf:/etc/nginx/nginx.conf:ro
      - ha-nginx-cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=load-balancer"
      - "aldeci.role=ingress"
      - "aldeci.tier=edge"

  # ──────────────────────────────────────────────────────────────────────────
  # redis — Cache + rate limiting + session store (Redis 7, AOF)
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aldeci-ha-redis
    <<: *default-restart
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    volumes:
      - ha-redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=infrastructure"
      - "aldeci.role=cache"
      - "aldeci.tier=data"

  # ──────────────────────────────────────────────────────────────────────────
  # pg-primary — PostgreSQL 16 primary (future migration from SQLite)
  # ──────────────────────────────────────────────────────────────────────────
  pg-primary:
    image: postgres:16-alpine
    container_name: aldeci-ha-pg-primary
    <<: *default-restart
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-aldeci}"
      POSTGRES_USER: "${POSTGRES_USER:-aldeci}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      # Replication setup
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c wal_level=replica
        -c max_wal_senders=5
        -c max_replication_slots=5
        -c hot_standby=on
        -c archive_mode=on
        -c archive_command='cp %p /var/lib/postgresql/archive/%f'
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=200
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
    volumes:
      - ha-pg-primary-data:/var/lib/postgresql/data
      - ha-pg-archive:/var/lib/postgresql/archive
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/pg-primary-init.sh:/docker-entrypoint-initdb.d/99_replication.sh:ro
    ports:
      - "${PG_PRIMARY_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aldeci} -d ${POSTGRES_DB:-aldeci}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=infrastructure"
      - "aldeci.role=database-primary"
      - "aldeci.tier=data"

  # ──────────────────────────────────────────────────────────────────────────
  # pg-replica — PostgreSQL 16 streaming replica (read-only)
  # ──────────────────────────────────────────────────────────────────────────
  pg-replica:
    image: postgres:16-alpine
    container_name: aldeci-ha-pg-replica
    <<: *default-restart
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      PGUSER: "${POSTGRES_USER:-aldeci}"
      PGPASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Wait for primary to be fully ready
        until pg_isready -h pg-primary -U $${PGUSER}; do
          echo "Waiting for primary..."
          sleep 2
        done

        # If data directory is empty, do a base backup from primary
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          echo "Performing base backup from primary..."
          pg_basebackup -h pg-primary -U replicator -D /var/lib/postgresql/data \
            -Fp -Xs -P -R
        fi

        # Ensure standby.signal exists
        touch /var/lib/postgresql/data/standby.signal

        # Configure recovery
        cat > /var/lib/postgresql/data/postgresql.auto.conf << EOF
        primary_conninfo = 'host=pg-primary port=5432 user=replicator password=$${PGPASSWORD} application_name=replica1'
        recovery_target_timeline = 'latest'
        hot_standby = on
        EOF

        exec postgres \
          -c shared_buffers=128MB \
          -c effective_cache_size=384MB \
          -c max_connections=200 \
          -c hot_standby=on \
          -c hot_standby_feedback=on
    volumes:
      - ha-pg-replica-data:/var/lib/postgresql/data
    ports:
      - "${PG_REPLICA_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aldeci}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=infrastructure"
      - "aldeci.role=database-replica"
      - "aldeci.tier=data"

  # ──────────────────────────────────────────────────────────────────────────
  # aldeci-api-1 — FastAPI backend replica 1
  # ──────────────────────────────────────────────────────────────────────────
  aldeci-api-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: aldeci-api:ha
    container_name: aldeci-ha-api-1
    <<: *default-restart
    depends_on:
      redis:
        condition: service_healthy
      pg-primary:
        condition: service_healthy
    environment:
      <<: *aldeci-env
      FIXOPS_WORKERS: "${FIXOPS_WORKERS:-2}"
      ALDECI_SEED_DEMO: "${ALDECI_SEED_DEMO:-0}"
      PYTHONPATH: "/app/suite-api:/app/suite-core:/app/suite-attack:/app/suite-feeds:/app/suite-evidence-risk:/app/suite-integrations:/app"
      INSTANCE_ID: "api-1"
    volumes:
      - ha-aldeci-data:/app/data
    ports:
      - "${API_PORT_1:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=api"
      - "aldeci.role=backend"
      - "aldeci.tier=application"
      - "aldeci.instance=1"

  # ──────────────────────────────────────────────────────────────────────────
  # aldeci-api-2 — FastAPI backend replica 2
  # ──────────────────────────────────────────────────────────────────────────
  aldeci-api-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: aldeci-api:ha
    container_name: aldeci-ha-api-2
    <<: *default-restart
    depends_on:
      redis:
        condition: service_healthy
      pg-primary:
        condition: service_healthy
      aldeci-api-1:
        condition: service_healthy
    environment:
      <<: *aldeci-env
      FIXOPS_WORKERS: "${FIXOPS_WORKERS:-2}"
      ALDECI_SEED_DEMO: "0"
      PYTHONPATH: "/app/suite-api:/app/suite-core:/app/suite-attack:/app/suite-feeds:/app/suite-evidence-risk:/app/suite-integrations:/app"
      INSTANCE_ID: "api-2"
    volumes:
      - ha-aldeci-data:/app/data
    ports:
      - "${API_PORT_2:-8001}:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=api"
      - "aldeci.role=backend"
      - "aldeci.tier=application"
      - "aldeci.instance=2"

  # ──────────────────────────────────────────────────────────────────────────
  # aldeci-ui — React 19 frontend (Nginx serving Vite build)
  # ──────────────────────────────────────────────────────────────────────────
  aldeci-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
      args:
        VITE_API_URL: "${VITE_API_URL:-}"
    image: aldeci-ui:ha
    container_name: aldeci-ha-ui
    <<: *default-restart
    depends_on:
      aldeci-api-1:
        condition: service_healthy
    volumes:
      - ./nginx-ui.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx-health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    networks:
      - aldeci-ha
    labels:
      - "aldeci.service=ui"
      - "aldeci.role=frontend"
      - "aldeci.tier=presentation"

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  # Shared SQLite data volume (interim before PostgreSQL migration)
  ha-aldeci-data:
    driver: local
  # Redis AOF persistence
  ha-redis-data:
    driver: local
  # PostgreSQL primary data
  ha-pg-primary-data:
    driver: local
  # PostgreSQL WAL archive
  ha-pg-archive:
    driver: local
  # PostgreSQL replica data
  ha-pg-replica-data:
    driver: local
  # Nginx cache
  ha-nginx-cache:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  aldeci-ha:
    name: aldeci-ha
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
