# Alembic configuration for ALdeci CTEM+ Platform
# PostgreSQL target database is specified via FIXOPS_DB_DSN env var.
# Run migrations:  alembic upgrade head
# Create revision: alembic revision --autogenerate -m "description"

[alembic]
# The sqlalchemy.url is overridden in alembic/env.py from FIXOPS_DB_DSN.
# This placeholder is required by Alembic config parsing but is never used
# directly when FIXOPS_DB_DSN is set.
sqlalchemy.url = postgresql://fixops:fixops@localhost:5432/fixops

script_location = alembic

# Template for new migration files
file_template = %%(rev)s_%%(slug)s

# Maximum length of the "slug" portion of a migration filename
truncate_slug_length = 40

# Revision id format (use short 12-char hex)
revision_environment = false

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
