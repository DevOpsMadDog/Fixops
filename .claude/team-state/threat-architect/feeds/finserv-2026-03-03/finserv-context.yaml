org:
  name: SecureTrade Financial Corp
  industry: financial_services
  size: enterprise
  annual_revenue: $2.4B
  employees: 8500
  regulatory_jurisdiction: US_SEC_FINRA

crown_jewels:
  - name: trade-execution-engine
    type: microservice
    criticality: critical
    data_classification: PCI
    sla_target: 99.999
    owner: trading-platform-team
    dependencies:
      - cloud-spanner-ledger
      - cloud-kms-encryption
      - kafka-trade-events
    max_acceptable_downtime: 30s
    financial_impact_per_hour: $12M

  - name: settlement-service
    type: microservice
    criticality: critical
    data_classification: PCI_SOX
    sla_target: 99.99
    owner: settlement-ops-team
    dependencies:
      - alloydb-settlement
      - clearing-house-api
    regulatory_deadline: T+1

  - name: fraud-detection-ml
    type: ml_service
    criticality: high
    data_classification: PCI
    sla_target: 99.95
    owner: risk-analytics-team
    dependencies:
      - bigquery-analytics
      - redis-feature-store

  - name: regulatory-reporting
    type: batch_service
    criticality: high
    data_classification: SOX_REGULATED
    sla_target: 99.9
    owner: compliance-team
    regulatory_deadlines:
      - daily_trade_report: 18:00_ET
      - monthly_sox: 5th_business_day

  - name: customer-portfolio-api
    type: api_service
    criticality: high
    data_classification: PII_FINANCIAL
    sla_target: 99.95
    owner: customer-experience-team
    dependencies:
      - spanner-portfolio
      - redis-session-cache

environments:
  - name: production
    cloud: multi-cloud
    primary: gcp_us-central1
    dr: aws_us-east-1
    edge: cloudflare_global
    pci_scope: true
    sox_scope: true
    network_segmentation: vpc_service_controls

  - name: staging
    cloud: gcp
    region: us-central1
    pci_scope: false
    purpose: pre-production_validation

compliance_requirements:
  - PCI-DSS-v4.0
  - SOX-Section-302
  - SOX-Section-404
  - GLBA-501
  - FINRA-Rule-4370
  - SOC2-Type-II
