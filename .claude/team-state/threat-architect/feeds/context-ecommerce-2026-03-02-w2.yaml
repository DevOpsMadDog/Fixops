org:
  name: "Acme E-Commerce Corp"
  industry: "retail"
  size: "enterprise"
  revenue_bracket: "$500M-1B"
  employee_count: 2500
  compliance_requirements:
    - PCI-DSS-v4.0
    - SOC2-Type-II
    - GDPR
    - CCPA

crown_jewels:
  - name: "payment-service"
    type: "microservice"
    criticality: "critical"
    data_classification: "PCI"
    sla_target: 99.99
    owner: "payments-team"
    revenue_impact: "$45M/year direct processing"
    dependencies:
      - "postgres-payments"
      - "stripe-api"
      - "redis-session"

  - name: "user-service"
    type: "microservice"
    criticality: "high"
    data_classification: "PII"
    sla_target: 99.95
    owner: "identity-team"
    revenue_impact: "$12M/year (auth-gated features)"
    dependencies:
      - "postgres-users"
      - "cognito"
      - "redis-cache"

  - name: "order-service"
    type: "microservice"
    criticality: "critical"
    data_classification: "PCI"
    sla_target: 99.95
    owner: "commerce-team"
    revenue_impact: "$120M/year order flow"
    dependencies:
      - "postgres-orders"
      - "rabbitmq"
      - "payment-service"

  - name: "catalog-service"
    type: "microservice"
    criticality: "medium"
    data_classification: "public"
    sla_target: 99.9
    owner: "product-team"
    revenue_impact: "$8M/year (product discovery)"

  - name: "search-service"
    type: "microservice"
    criticality: "high"
    data_classification: "internal"
    sla_target: 99.9
    owner: "search-team"
    revenue_impact: "$22M/year (search-driven purchases)"
    dependencies:
      - "elasticsearch"
      - "redis-cache"

environments:
  - name: "production"
    cloud: "aws"
    region: "us-east-1"
    deployment: "ecs-fargate"
    network: "vpc-private-subnets"
    monitoring: "cloudwatch+datadog"

  - name: "staging"
    cloud: "aws"
    region: "us-east-1"
    deployment: "ecs-fargate"
    network: "vpc-private-subnets"

  - name: "development"
    cloud: "aws"
    region: "us-west-2"
    deployment: "local-docker"
