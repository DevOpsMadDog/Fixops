org:
  name: "Acme E-Commerce Corp"
  industry: "retail"
  size: "enterprise"
  employees: 2500
  annual_revenue: "$450M"
  compliance_requirements:
    - PCI-DSS-v4.0
    - SOC2-Type-II
    - GDPR
    - CCPA

crown_jewels:
  - name: "payment-service"
    type: "microservice"
    criticality: "critical"
    data_classification: "PCI"
    sla_target: 99.99
    rpo: "0 minutes"
    rto: "5 minutes"
    owner: "payments-team"
    dependencies:
      - "rds-postgresql"
      - "stripe-api"
      - "elasticache-redis"
    business_impact:
      revenue_at_risk: "$1.2M/hour"
      regulatory_fine_risk: "$5M"
      reputation_risk: "critical"

  - name: "user-service"
    type: "microservice"
    criticality: "high"
    data_classification: "PII"
    sla_target: 99.95
    rpo: "15 minutes"
    rto: "30 minutes"
    owner: "identity-team"
    dependencies:
      - "rds-postgresql"
      - "cognito-user-pool"
    business_impact:
      records_at_risk: "3.2M customer profiles"
      regulatory_fine_risk: "$20M (GDPR)"
      reputation_risk: "high"

  - name: "catalog-service"
    type: "microservice"
    criticality: "medium"
    data_classification: "public"
    sla_target: 99.9
    rpo: "1 hour"
    rto: "1 hour"
    owner: "product-team"
    dependencies:
      - "rds-postgresql"
      - "elasticsearch-cluster"
    business_impact:
      revenue_at_risk: "$200K/hour"
      reputation_risk: "medium"

  - name: "rds-postgresql"
    type: "database"
    criticality: "critical"
    data_classification: "PCI+PII"
    sla_target: 99.99
    rpo: "0 minutes"
    rto: "15 minutes"
    owner: "platform-team"
    business_impact:
      revenue_at_risk: "$1.2M/hour"
      data_loss_impact: "catastrophic"

environments:
  - name: "production"
    region: "us-east-1"
    account_id: "123456789012"
    components: 20
    data_sensitivity: "PCI+PII"
  - name: "staging"
    region: "us-east-1"
    account_id: "123456789013"
    components: 20
    data_sensitivity: "anonymized"
  - name: "development"
    region: "us-west-2"
    account_id: "123456789014"
    components: 15
    data_sensitivity: "synthetic"

threat_landscape:
  primary_threat_actors:
    - type: "cybercriminal"
      motivation: "financial"
      capability: "advanced"
      target: "payment data, customer PII"
    - type: "competitor"
      motivation: "espionage"
      capability: "moderate"
      target: "pricing data, customer lists"
  recent_incidents:
    - date: "2025-11-15"
      type: "credential_stuffing"
      impact: "12K accounts locked"
      lessons: "Implement adaptive MFA"
