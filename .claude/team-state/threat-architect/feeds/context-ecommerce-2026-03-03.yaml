org:
  name: "Acme E-Commerce Corp"
  industry: retail
  size: enterprise
  annual_revenue: "$840M"
  employees: 2400
  compliance:
    - PCI-DSS-v4.0
    - SOC2-Type-II
    - GDPR
    - CCPA

crown_jewels:
  - name: payment-service
    type: microservice
    criticality: critical
    data_classification: PCI
    sla: 99.99
    owner: payments-team
    dependencies:
      - rds-payments-db
      - stripe-api
      - redis-session-cache
      - aws-secrets-manager
    revenue_impact: "$2.3M/hour downtime"
    regulatory_exposure: "PCI-DSS scope, Level 1 merchant"

  - name: auth-service
    type: microservice
    criticality: critical
    data_classification: PII
    sla: 99.99
    owner: identity-team
    dependencies:
      - cognito-user-pool
      - rds-user-db
      - redis-session-cache
    revenue_impact: "$1.8M/hour (all services depend on auth)"
    regulatory_exposure: "GDPR Article 32, CCPA data protection"

  - name: order-service
    type: microservice
    criticality: critical
    data_classification: PCI
    sla: 99.95
    owner: commerce-team
    dependencies:
      - rds-payments-db
      - sqs-order-queue
      - payment-service
      - redis-session-cache
    revenue_impact: "$1.5M/hour"
    regulatory_exposure: "PCI-DSS transaction logging"

  - name: user-service
    type: microservice
    criticality: high
    data_classification: PII
    sla: 99.95
    owner: identity-team
    dependencies:
      - rds-user-db
      - redis-session-cache
    revenue_impact: "$400K/hour (profile, preferences, addresses)"
    regulatory_exposure: "GDPR right to erasure, CCPA right to deletion"

  - name: product-catalog-service
    type: microservice
    criticality: high
    data_classification: public
    sla: 99.9
    owner: commerce-team
    dependencies:
      - rds-catalog-db
      - opensearch-domain
      - s3-media-bucket
    revenue_impact: "$600K/hour (browsing, search, conversion)"

  - name: search-service
    type: microservice
    criticality: medium
    data_classification: public
    sla: 99.9
    owner: search-team
    dependencies:
      - opensearch-domain
      - redis-session-cache

  - name: analytics-service
    type: microservice
    criticality: medium
    data_classification: internal
    sla: 99.5
    owner: data-team
    dependencies:
      - rds-read-replica
      - cloudwatch-logs

  - name: rds-payments-db
    type: database
    criticality: critical
    data_classification: PCI
    sla: 99.99
    owner: platform-team
    backup_frequency: "continuous (point-in-time recovery)"
    retention: "35 days"
    encryption: "REQUIRED - currently MISSING (CNAPP-AWS-EC-003)"

  - name: redis-session-cache
    type: cache
    criticality: high
    data_classification: session
    sla: 99.95
    owner: platform-team
    encryption_in_transit: "REQUIRED - currently MISSING (CNAPP-AWS-EC-008)"

environments:
  - name: production
    cloud: aws
    region: us-east-1
    vpc_id: vpc-0a1b2c3d4e5f6g7h8
    account_id: "471923847561"
    deployment: ecs-fargate
    container_registry: ecr
    ci_cd: github-actions
    monitoring: cloudwatch
    alerting: pagerduty
    waf: "MISSING (CNAPP-AWS-EC-007)"

  - name: staging
    cloud: aws
    region: us-east-1
    account_id: "471923847562"
    deployment: ecs-fargate
    data: "sanitized production snapshot (weekly)"

  - name: development
    cloud: aws
    region: us-west-2
    account_id: "471923847563"
    deployment: ecs-fargate
    data: "synthetic test data"

threat_landscape:
  primary_threat_actors:
    - type: cybercriminal
      motivation: financial
      capability: moderate
      targets: ["payment-service", "user-service"]
    - type: competitor
      motivation: espionage
      capability: low
      targets: ["product-catalog-service", "analytics-service"]
    - type: insider
      motivation: financial
      capability: high
      targets: ["rds-payments-db", "aws-secrets-manager"]

  attack_surface:
    external_endpoints: 47
    authenticated_endpoints: 39
    public_endpoints: 8
    api_keys_in_rotation: 12
    ssl_certificates: 4
    dns_records: 23
