org:
  name: "MedSecure Health Technologies"
  industry: healthcare
  size: enterprise
  compliance:
    - HIPAA
    - HL7-FHIR-R4
    - SOC2-Type-II
    - HITRUST-CSF

crown_jewels:
  - name: patient-records-service
    type: microservice
    criticality: critical
    data_classification: PHI
    sla_target: 99.99
    owner: clinical-engineering
    dependencies:
      - cosmos-db-phi
      - azure-sql-clinical
      - key-vault
      - blob-storage-phi

  - name: fhir-integration-service
    type: integration
    criticality: critical
    data_classification: PHI
    sla_target: 99.95
    owner: interoperability-team
    dependencies:
      - logic-apps-fhir
      - event-hub
      - external-ehr

  - name: clinical-analytics
    type: analytics
    criticality: high
    data_classification: confidential
    sla_target: 99.9
    owner: data-science-team

environments:
  - name: production
    cloud: azure
    region: eastus2
    classification: phi
    network: private-vnet
  - name: staging
    cloud: azure
    region: eastus2
    classification: test-phi
    network: isolated-vnet
  - name: development
    cloud: azure
    region: eastus
    classification: synthetic
    network: dev-vnet
