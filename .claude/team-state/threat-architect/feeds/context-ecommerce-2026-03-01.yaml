org:
  name: "Acme E-Commerce Corp"
  industry: "retail"
  size: "enterprise"
  annual_revenue: "$450M"
  employees: 2800
  engineering_headcount: 320
  security_team_size: 12
  compliance_requirements:
    - PCI-DSS-v4.0
    - SOC2-Type-II
    - GDPR
    - CCPA
  regulatory_jurisdictions:
    - US
    - EU
    - UK
  data_processing_regions:
    - us-east-1
    - eu-west-1

crown_jewels:
  - name: "payment-service"
    criticality: "critical"
    data_classification: "PCI"
  - name: "user-service"
    criticality: "high"
    data_classification: "PII"
  - name: "api-gateway"
    criticality: "critical"
    data_classification: "mixed"

environments:
  - name: "production"
    account_id: "123456789012"
    region: "us-east-1"
  - name: "staging"
    account_id: "234567890123"
    region: "us-east-1"
  - name: "development"
    account_id: "345678901234"
    region: "us-east-1"

risk_appetite:
  overall: "moderate"
  availability_tolerance: "very_low"
  data_breach_tolerance: "zero"
  financial_loss_threshold: "$500K"
  reputation_sensitivity: "high"

assets:
  - name: "payment-service"
    type: "microservice"
    language: "java"
    framework: "spring-boot-3.2"
    criticality: "critical"
    data_classification: "PCI"
    data_types:
      - "cardholder_data"
      - "PAN"
      - "CVV_transient"
      - "transaction_records"
    sla_target: 99.99
    rpo_hours: 0.5
    rto_hours: 1
    owner: "payments-team"
    tech_lead: "j.martinez@acme.example.com"
    dependencies:
      - "postgres-payments"
      - "stripe-api"
      - "redis-session"
      - "auth-service"
    deployment:
      platform: "ECS-Fargate"
      replicas: 4
      auto_scaling: true
      region: "us-east-1"
    external_integrations:
      - name: "Stripe"
        type: "payment_gateway"
        protocol: "HTTPS/REST"
        data_exchanged: "PAN, amount, merchant_id"
      - name: "Plaid"
        type: "bank_verification"
        protocol: "HTTPS/REST"
        data_exchanged: "account_tokens"

  - name: "user-service"
    type: "microservice"
    language: "java"
    framework: "spring-boot-3.2"
    criticality: "high"
    data_classification: "PII"
    data_types:
      - "email"
      - "name"
      - "address"
      - "phone"
      - "date_of_birth"
      - "password_hash"
    sla_target: 99.95
    rpo_hours: 1
    rto_hours: 2
    owner: "identity-team"
    tech_lead: "s.chen@acme.example.com"
    dependencies:
      - "postgres-users"
      - "redis-session"
      - "auth-service"
      - "notification-service"
    deployment:
      platform: "ECS-Fargate"
      replicas: 3
      auto_scaling: true
      region: "us-east-1"

  - name: "catalog-service"
    type: "microservice"
    language: "java"
    framework: "spring-boot-3.2"
    criticality: "medium"
    data_classification: "public"
    data_types:
      - "product_listings"
      - "pricing"
      - "inventory_counts"
      - "product_images"
    sla_target: 99.9
    rpo_hours: 4
    rto_hours: 4
    owner: "catalog-team"
    tech_lead: "r.patel@acme.example.com"
    dependencies:
      - "postgres-catalog"
      - "redis-cache"
      - "elasticsearch"
      - "s3-media"
    deployment:
      platform: "ECS-Fargate"
      replicas: 3
      auto_scaling: true
      region: "us-east-1"

  - name: "api-gateway"
    type: "gateway"
    language: "nodejs"
    framework: "express-4.18"
    criticality: "critical"
    data_classification: "mixed"
    data_types:
      - "jwt_tokens"
      - "api_keys"
      - "request_metadata"
    sla_target: 99.99
    rpo_hours: 0
    rto_hours: 0.5
    owner: "platform-team"
    tech_lead: "a.johnson@acme.example.com"
    dependencies:
      - "redis-rate-limit"
      - "auth-service"
      - "cloudfront-cdn"
    deployment:
      platform: "ECS-Fargate"
      replicas: 6
      auto_scaling: true
      region: "us-east-1"
    security_controls:
      - "rate_limiting"
      - "jwt_validation"
      - "cors_enforcement"
      - "request_size_limit"
      - "waf_integration"

  - name: "analytics-service"
    type: "microservice"
    language: "python"
    framework: "fastapi-0.109"
    criticality: "low"
    data_classification: "internal"
    data_types:
      - "aggregated_metrics"
      - "conversion_rates"
      - "revenue_reports"
      - "user_behavior_analytics"
    sla_target: 99.5
    rpo_hours: 24
    rto_hours: 8
    owner: "data-team"
    tech_lead: "l.wong@acme.example.com"
    dependencies:
      - "postgres-analytics"
      - "bigquery"
      - "redis-cache"
      - "celery-workers"
    deployment:
      platform: "ECS-Fargate"
      replicas: 2
      auto_scaling: false
      region: "us-east-1"

infrastructure:
  cloud_provider: "AWS"
  account_structure:
    - account_id: "123456789012"
      alias: "acme-ecommerce-prod"
      environment: "production"
    - account_id: "234567890123"
      alias: "acme-ecommerce-staging"
      environment: "staging"
    - account_id: "345678901234"
      alias: "acme-ecommerce-dev"
      environment: "development"
  networking:
    vpc_cidr: "10.0.0.0/16"
    public_subnets:
      - "10.0.1.0/24"
      - "10.0.2.0/24"
    private_subnets:
      - "10.0.10.0/24"
      - "10.0.11.0/24"
    database_subnets:
      - "10.0.20.0/24"
      - "10.0.21.0/24"
    nat_gateways: 2
    transit_gateway: false
  security:
    waf_enabled: true
    guardduty_enabled: true
    security_hub_enabled: true
    config_enabled: true
    macie_enabled: false
    inspector_enabled: false

incident_response:
  primary_contact: "security-team@acme.example.com"
  escalation_path:
    - level: "P1"
      team: "on-call-sre"
      response_time_minutes: 15
    - level: "P2"
      team: "security-team"
      response_time_minutes: 60
    - level: "P3"
      team: "engineering-leads"
      response_time_minutes: 240
  breach_notification:
    gdpr_deadline_hours: 72
    pci_deadline_hours: 24
    state_ag_deadlines:
      california: 72
      new_york: 72
