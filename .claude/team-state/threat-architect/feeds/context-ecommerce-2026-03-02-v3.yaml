org:
  name: "Acme E-Commerce Corp"
  industry: "retail"
  size: "enterprise"
  annual_revenue: "$450M"
  compliance_requirements:
    - PCI-DSS-v4.0
    - SOC2-Type-II
    - GDPR
    - CCPA

crown_jewels:
  - name: "payment-service"
    type: "microservice"
    criticality: "critical"
    data_classification: "PCI-CHD"
    sla_target: 99.99
    owner: "payments-team"
    dependencies:
      - "rds-orders"
      - "stripe-api"
      - "kms-encryption"
      - "secrets-manager"
    revenue_impact: "$450M annual GMV processed"
    breach_cost_estimate: "$12.5M (PCI fines + brand damage + forensics)"

  - name: "user-service"
    type: "microservice"
    criticality: "high"
    data_classification: "PII"
    sla_target: 99.95
    owner: "identity-team"
    dependencies:
      - "rds-users"
      - "cognito"
      - "redis-sessions"
    breach_cost_estimate: "$4.2M (GDPR fines + notification costs)"

  - name: "order-service"
    type: "microservice"
    criticality: "high"
    data_classification: "PCI-SAD"
    sla_target: 99.95
    owner: "commerce-team"
    dependencies:
      - "rds-orders"
      - "sqs-orders"
      - "s3-order-docs"
    revenue_impact: "$1.2M/hour during peak (Black Friday)"

  - name: "catalog-service"
    type: "microservice"
    criticality: "medium"
    data_classification: "public"
    sla_target: 99.9
    owner: "commerce-team"
    dependencies:
      - "opensearch"
      - "redis-cache"

  - name: "fraud-detector"
    type: "lambda"
    criticality: "critical"
    data_classification: "PCI-CHD"
    sla_target: 99.99
    owner: "risk-team"
    dependencies:
      - "eventbridge"
      - "rds-orders"

environments:
  - name: "production"
    region: "us-east-1"
    vpc_id: "vpc-0a1b2c3d4e5f67890"
    account_id: "123456789012"
    classification: "PCI-CDE"

  - name: "staging"
    region: "us-east-1"
    vpc_id: "vpc-0f9e8d7c6b5a43210"
    account_id: "234567890123"
    classification: "non-production"

  - name: "dr"
    region: "us-west-2"
    vpc_id: "vpc-0abcdef1234567890"
    account_id: "123456789012"
    classification: "PCI-CDE"
