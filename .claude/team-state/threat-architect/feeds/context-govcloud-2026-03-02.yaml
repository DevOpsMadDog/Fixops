org:
  name: "FedShield Defense Systems"
  industry: government_defense
  size: enterprise
  compliance:
    - FedRAMP-High
    - NIST-800-53-rev5
    - FIPS-140-2
    - CMMC-Level-3
    - ITAR

crown_jewels:
  - name: mission-command-api
    type: api_server
    criticality: critical
    data_classification: CUI
    sla_target: 99.99
    owner: mission-systems-team
    dependencies:
      - postgresql-fips
      - vault-fips
      - istio-mesh
      - keycloak-sso

  - name: classified-document-store
    type: object_storage
    criticality: critical
    data_classification: secret
    sla_target: 99.99
    owner: information-assurance
    dependencies:
      - minio-s3
      - vault-fips
      - audit-log-vault

  - name: identity-federation
    type: identity_provider
    criticality: critical
    data_classification: CUI
    sla_target: 99.999
    owner: cybersecurity-team
    dependencies:
      - keycloak-sso
      - cac-piv-module
      - audit-log-vault

  - name: air-gapped-instance
    type: deployment
    criticality: critical
    data_classification: secret
    sla_target: 99.999
    owner: deployment-team
    dependencies:
      - all-services-offline-bundle

environments:
  - name: production-il5
    cloud: govcloud
    region: us-gov-west-1
    classification: CUI
    network: il5-boundary
  - name: air-gapped
    cloud: on-premise
    location: scif
    classification: secret
    network: isolated-enclave
  - name: staging
    cloud: govcloud
    region: us-gov-west-1
    classification: CUI-test
    network: staging-boundary
