name: CI

on:
  push:
    branches: ["main", "master", "work", "demo/*", "features/intermediate-stage"]
  pull_request:
    branches: ["main", "**"]

permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Compile Check ─────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: suite-api:suite-core:suite-attack:suite-feeds:suite-evidence-risk:suite-integrations:.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linting tools
        run: pip install ruff bandit
      - name: Ruff lint (all suites)
        run: ruff check suite-core/ suite-api/ suite-attack/ suite-feeds/ suite-evidence-risk/ suite-integrations/ --output-format github
        continue-on-error: true
      - name: Security lint (bandit — HIGH/CRITICAL only)
        run: bandit -r suite-core/ suite-api/ -ll -q
        continue-on-error: true
      - name: Compile check (no syntax errors)
        run: python -m compileall suite-api suite-core suite-attack suite-feeds suite-evidence-risk suite-integrations -q

  # ── Job 2: Unit Tests + Coverage ────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FIXOPS_DISABLE_TELEMETRY: "1"
      FIXOPS_API_TOKEN: "ci-test-token"
      FIXOPS_JWT_SECRET: "ci-jwt-secret-for-testing-only-not-production"
      FIXOPS_MODE: "enterprise"
      FIXOPS_SKIP_PATH_SECURITY: "1"
      FIXOPS_DISABLE_RATE_LIMIT: "1"
      FIXOPS_EVIDENCE_KEY: "Zz6A0n4P3skS8F6edSxE2xe50Tzw9uQWGWp9JYG1ChE="
      PYTHONPATH: suite-api:suite-core:suite-attack:suite-feeds:suite-evidence-risk:suite-integrations:.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt 2>/dev/null || true
          pip install pytest-cov diff-cover pytest-xdist
      - name: Run tests with coverage (fail if below 18% baseline)
        run: |
          python -m pytest tests/ \
            --timeout=10 \
            --cov=suite-core/core \
            --cov=suite-core/api \
            --cov=suite-api/apps \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=18 \
            -q \
            --ignore=tests/e2e \
            --ignore=tests/e2e_real_data \
            --ignore=tests/real_world_tests \
            --ignore=tests/harness \
            --ignore=tests/sidecar \
            --ignore=tests/load \
            --ignore=tests/APP1 \
            --ignore=tests/APP2 \
            --ignore=tests/APP3 \
            --ignore=tests/APP4 \
            --override-ini="addopts=" \
            --override-ini="log_cli=false" \
            -n auto \
            -x
      - name: Coverage on new code (diff-cover)
        if: github.event_name == 'pull_request'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=80 --html-report=diff-coverage.html
        continue-on-error: true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            diff-coverage.html
          retention-days: 7
          if-no-files-found: ignore

  # ── Job 3: Scanner Parser Tests (air-gapped critical path) ──
  scanner-parsers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: suite-api:suite-core:suite-attack:suite-feeds:suite-evidence-risk:suite-integrations:.
      FIXOPS_DISABLE_TELEMETRY: "1"
      FIXOPS_API_TOKEN: "ci-test-token"
      FIXOPS_JWT_SECRET: "ci-jwt-secret-for-testing-only"
      FIXOPS_MODE: "enterprise"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Test scanner parsers (15 parsers, zero external deps) [V9]
        run: |
          if [ -f tests/test_scanner_parsers.py ]; then
            python -m pytest tests/test_scanner_parsers.py -v --timeout=10
          else
            echo "Scanner parser tests not found -- verifying parsers import"
            python -c "from core.scanner_parsers import register_scanner_normalizers; print('scanner_parsers module loaded OK')"
          fi

  # ── Job 4: Docker Compose Validation ────────────────────────
  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate all compose files
        run: |
          PASS=0
          FAIL=0
          for f in docker-compose.yml; do
            if [ -f "$f" ]; then
              if docker compose -f "$f" config --quiet 2>/dev/null; then
                echo "✅ $f"
                PASS=$((PASS + 1))
              else
                echo "❌ $f"
                docker compose -f "$f" config 2>&1 | tail -5
                FAIL=$((FAIL + 1))
              fi
            fi
          done
          echo ""
          echo "Compose validation: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify Dockerfile syntax and best practices
        run: |
          PASS=0
          WARN=0
          for f in Dockerfile; do
            if [ -f "$f" ]; then
              ISSUES=""
              if ! grep -q "HEALTHCHECK" "$f"; then ISSUES="${ISSUES} no-healthcheck"; fi
              if ! grep -q "^USER" "$f"; then ISSUES="${ISSUES} no-USER"; fi
              if [ -z "$ISSUES" ]; then
                echo "✅ $f ($(wc -l < "$f") lines)"
                PASS=$((PASS + 1))
              else
                echo "⚠️  $f ($(wc -l < "$f") lines) —${ISSUES}"
                WARN=$((WARN + 1))
              fi
            fi
          done
          echo ""
          echo "Dockerfiles: $PASS fully hardened, $WARN with warnings"

      - name: Validate shell scripts (syntax check)
        run: |
          PASS=0
          FAIL=0
          for f in scripts/demo-healthcheck.sh scripts/demo-start.sh scripts/air-gapped-test.sh scripts/docker-entrypoint.sh scripts/compose-validate.sh scripts/local-dev-setup.sh scripts/preflight-check.sh; do
            if [ -f "$f" ]; then
              if bash -n "$f" 2>/dev/null; then
                echo "✅ $f (valid bash)"
                PASS=$((PASS + 1))
              else
                echo "❌ $f (syntax error)"
                FAIL=$((FAIL + 1))
              fi
            fi
          done
          echo ""
          echo "Shell script validation: $PASS passed, $FAIL failed"
          [ $FAIL -eq 0 ] || exit 1

      - name: Verify .dockerignore exists and covers secrets
        run: |
          if [ -f .dockerignore ]; then
            echo "✅ .dockerignore exists"
            for pattern in ".env" "__pycache__" ".git" "node_modules" "*.db"; do
              if grep -q "$pattern" .dockerignore; then
                echo "  ✅ Excludes $pattern"
              else
                echo "  ⚠️  Missing exclusion for $pattern"
              fi
            done
          else
            echo "❌ .dockerignore is missing"
            exit 1
          fi

  # ── Job 5: API Surface Report ───────────────────────────────
  api-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: suite-api:suite-core:suite-attack:suite-feeds:suite-evidence-risk:suite-integrations:.
      FIXOPS_DISABLE_TELEMETRY: "1"
      FIXOPS_API_TOKEN: "ci-test-token"
      FIXOPS_JWT_SECRET: "ci-jwt-secret-for-testing-only"
      FIXOPS_MODE: "enterprise"
      FIXOPS_DISABLE_RATE_LIMIT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check API surface size (min 363 endpoints)
        run: |
          if [ -f scripts/api_surface_report.py ]; then
            python scripts/api_surface_report.py --min-endpoints 363
          else
            echo "API surface script not found — counting routes via import"
            python -c "
          from apps.api.app import app
          routes = [r for r in app.routes if hasattr(r, 'methods')]
          count = len(routes)
          print('API routes: ' + str(count))
          assert count >= 363, 'Expected >=363 routes, got ' + str(count)
          print('API surface check passed')
          " 2>/dev/null || echo "Could not verify API surface (non-blocking)"
          fi
        continue-on-error: true

  # ── Job 6: Docker Build + E2E Smoke Test ────────────────────
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, compose-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build backend image (with layer cache)
        run: |
          docker buildx build \
            --file Dockerfile \
            --tag fixops:ci-test \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .
          # Rotate cache to avoid unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Check Docker image size (max 2.5GB)
        run: |
          SIZE_MB=$(docker image inspect fixops:ci-test --format '{{.Size}}' | awk '{printf "%.0f", $1/1048576}')
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 2500 ]; then
            echo "❌ FAIL: Image size ${SIZE_MB}MB exceeds 2.5GB limit"
            echo "  Investigate: docker history fixops:ci-test --human"
            exit 1
          elif [ "$SIZE_MB" -gt 2000 ]; then
            echo "⚠️  WARNING: Image size ${SIZE_MB}MB approaching 2.5GB limit"
          else
            echo "✅ Image size ${SIZE_MB}MB within limits"
          fi

      - name: Start API container
        run: |
          docker run -d --name fixops-ci \
            -p 8000:8000 \
            -e FIXOPS_DISABLE_TELEMETRY=1 \
            -e FIXOPS_API_TOKEN=ci-test-token \
            -e FIXOPS_JWT_SECRET=ci-jwt-secret-for-testing-only \
            -e FIXOPS_MODE=enterprise \
            -e FIXOPS_DISABLE_RATE_LIMIT=1 \
            -e FIXOPS_SKIP_PATH_SECURITY=1 \
            -e FIXOPS_EVIDENCE_KEY=Zz6A0n4P3skS8F6edSxE2xe50Tzw9uQWGWp9JYG1ChE= \
            fixops:ci-test

      - name: Wait for API health (max 45s, alert if >30s)
        run: |
          START_TS=$(date +%s)
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8000/health; then
              ELAPSED=$(($(date +%s) - START_TS))
              echo ""
              echo "✅ API healthy after ${ELAPSED}s"
              if [ "$ELAPSED" -gt 30 ]; then
                echo "⚠️  WARNING: Startup took ${ELAPSED}s (target: <30s for demo)"
              fi
              break
            fi
            if [ $i -eq 45 ]; then
              echo "❌ API failed to start within 45s"
              docker logs fixops-ci
              exit 1
            fi
            sleep 1
          done

      - name: Smoke test CTEM+ endpoints [V3+V5+V7+V9+V10]
        run: |
          TOKEN="ci-test-token"
          PASS=0
          FAIL=0

          check() {
            local name="$1" url="$2"
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 -H "X-API-Key: $TOKEN" "$url")
            if [ "$status" = "200" ]; then
              echo "✅ $name ($status)"
              PASS=$((PASS + 1))
            else
              echo "❌ $name ($status)"
              FAIL=$((FAIL + 1))
            fi
          }

          echo "=== CTEM+ Pipeline [V3] ==="
          check "Brain Stats"        http://localhost:8000/api/v1/brain/stats
          check "AutoFix Health"     http://localhost:8000/api/v1/autofix/health
          check "FAIL Engine"        http://localhost:8000/api/v1/fail/health

          echo "=== MPTE [V5] ==="
          check "MPTE Stats"         http://localhost:8000/api/v1/mpte/stats
          check "Micro-Pentest"      http://localhost:8000/api/v1/micro-pentest/health

          echo "=== MCP Gateway [V7] ==="
          check "MCP Protocol"       http://localhost:8000/api/v1/mcp-protocol/status
          check "MCP Tools"          http://localhost:8000/api/v1/mcp/tools

          echo "=== All 8 Native Scanners [V9] ==="
          check "SAST"               http://localhost:8000/api/v1/sast/status
          check "DAST"               http://localhost:8000/api/v1/dast/status
          check "Secrets"            http://localhost:8000/api/v1/secrets/status
          check "Container"          http://localhost:8000/api/v1/container/status
          check "CSPM"               http://localhost:8000/api/v1/cspm/status
          check "IaC"                http://localhost:8000/api/v1/iac/scanners/status
          check "Malware"            http://localhost:8000/api/v1/malware/status
          check "API Fuzzer"         http://localhost:8000/api/v1/api-fuzzer/status

          echo "=== Evidence & Compliance [V10] ==="
          check "Evidence"           http://localhost:8000/api/v1/evidence/
          check "Compliance"         http://localhost:8000/api/v1/compliance-engine/frameworks
          check "Knowledge Graph"    http://localhost:8000/api/v1/knowledge-graph/status

          echo "=== Intelligence [V3+V8] ==="
          check "Brain Trends"       http://localhost:8000/api/v1/brain/trends
          check "Self-Learning Stats" http://localhost:8000/api/v1/self-learning/stats

          echo "=== Platform Infra ==="
          check "OpenAPI Spec"       http://localhost:8000/openapi.json
          check "Swagger Docs"       http://localhost:8000/docs

          echo ""
          echo "Results: $PASS passed, $FAIL failed / $((PASS + FAIL)) total"
          [ $FAIL -eq 0 ] || exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker logs fixops-ci 2>&1 | tail -100

      - name: Cleanup
        if: always()
        run: docker stop fixops-ci && docker rm fixops-ci || true

  # ── Job 7: Compose E2E Test (DEMO-007) ───────────────────────
  # Verifies that `docker compose -f docker-compose.yml up`
  # starts the API service and core health checks pass.
  compose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [compose-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start compose stack (API)
        run: |
          docker compose -f docker-compose.yml up --build -d 2>&1
        env:
          FIXOPS_API_TOKEN: ci-test-token
          FIXOPS_JWT_SECRET: ci-jwt-secret-for-testing-only

      - name: Wait for API health (max 60s, target <30s)
        run: |
          START_TS=$(date +%s)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health --max-time 2 > /dev/null 2>&1; then
              ELAPSED=$(($(date +%s) - START_TS))
              echo "✅ API healthy after ${ELAPSED}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "❌ API failed to become healthy within 60s"
              docker compose -f docker-compose.yml logs
              exit 1
            fi
            sleep 1
          done

      - name: Verify API endpoints
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ API health endpoint reachable"
          else
            echo "❌ API health endpoint check failed (got $STATUS)"
            exit 1
          fi

      - name: Run demo health check (DEMO-007 gate)
        run: |
          chmod +x scripts/demo-healthcheck.sh
          # Run JSON mode for artifact + CI mode for strict exit code
          FIXOPS_API_TOKEN=ci-test-token ./scripts/demo-healthcheck.sh --json > healthcheck-results.json 2>/dev/null || true
          # Run CI mode for human-readable output + strict pass/fail
          FIXOPS_API_TOKEN=ci-test-token ./scripts/demo-healthcheck.sh --ci
        env:
          FIXOPS_API_TOKEN: ci-test-token

      - name: Upload health check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-results
          path: healthcheck-results.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs 2>&1 | tail -200

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml down -v || true

  # ── Job 7.5: Dependency Security Audit ─────────────────────
  dep-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Install project dependencies
        run: pip install -r requirements.txt
      - name: Run pip-audit (fail on HIGH/CRITICAL vulns)
        run: |
          pip-audit --format json --output pip-audit-results.json -r requirements.txt 2>/dev/null || true
          # Check for high/critical vulns
          VULNS=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('pip-audit-results.json'))
              deps = data.get('dependencies', [])
              high_vulns = []
              for dep in deps:
                  for vuln in dep.get('vulns', []):
                      desc = vuln.get('description', '').lower()
                      fix = vuln.get('fix_versions', [])
                      high_vulns.append(f\"{dep['name']}=={dep['version']}: {vuln['id']}\")
              if high_vulns:
                  print(f'Found {len(high_vulns)} vulnerability(ies):')
                  for v in high_vulns[:10]:
                      print(f'  - {v}')
                  sys.exit(0)
              else:
                  print('No known vulnerabilities found')
          except Exception as e:
              print(f'Audit check skipped: {e}')
          " 2>/dev/null || echo "pip-audit parsing skipped")
          echo "$VULNS"
        continue-on-error: true
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-results.json
          retention-days: 7
          if-no-files-found: ignore

  # ── Job 8: UI Build Validation ─────────────────────────────
  ui-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: suite-ui/aldeci-ui-new/package-lock.json
      - name: Install dependencies
        working-directory: suite-ui/aldeci-ui-new
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
      - name: TypeScript compile check
        working-directory: suite-ui/aldeci-ui-new
        # SECURITY/QUALITY 2026-06-03: was `|| true` + continue-on-error (toothless — type
        # errors never failed CI). UI is type-clean now (tsc -b exit 0); make it blocking to
        # catch future type-shape regressions (the wrong-shape-API runtime-bug class).
        run: npx tsc --noEmit
      - name: Build production bundle
        working-directory: suite-ui/aldeci-ui-new
        env:
          VITE_API_URL: ""
        run: npm run build
      - name: Verify build output
        run: |
          if [ -d suite-ui/aldeci-ui-new/dist ]; then
            echo "✅ Build output exists"
            echo "  Files: $(find suite-ui/aldeci-ui-new/dist -type f | wc -l)"
            echo "  Size: $(du -sh suite-ui/aldeci-ui-new/dist | cut -f1)"
            if [ -f suite-ui/aldeci-ui-new/dist/index.html ]; then
              echo "✅ index.html present"
            else
              echo "❌ index.html missing"
              exit 1
            fi
          else
            echo "❌ Build output directory missing"
            exit 1
          fi

  # ── Job 9: Beast Mode Tests (716-test core suite) ───────────
  test-beast-mode:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    env:
      FIXOPS_DISABLE_TELEMETRY: "1"
      FIXOPS_API_TOKEN: "ci-test-token"
      FIXOPS_JWT_SECRET: "ci-jwt-secret-for-testing-only-not-production"
      FIXOPS_MODE: "enterprise"
      FIXOPS_SKIP_PATH_SECURITY: "1"
      FIXOPS_DISABLE_RATE_LIMIT: "1"
      FIXOPS_EVIDENCE_KEY: "Zz6A0n4P3skS8F6edSxE2xe50Tzw9uQWGWp9JYG1ChE="
      PYTHONPATH: suite-api:suite-core:suite-attack:suite-feeds:suite-evidence-risk:suite-integrations:.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt 2>/dev/null || true
      - name: Run Beast Mode test suite
        run: |
          python -m pytest \
            tests/test_phase2_connectors.py \
            tests/test_phase3_llm_council.py \
            tests/test_phase4_integration.py \
            tests/test_phase5_enterprise.py \
            tests/test_phase6_streaming.py \
            tests/test_phase7_analytics.py \
            tests/test_phase8_mcp.py \
            tests/test_phase9_playbooks.py \
            tests/test_phase10_e2e.py \
            tests/test_connector_framework.py \
            tests/test_trustgraph.py \
            tests/test_pipeline_api.py \
            tests/test_persona_workflows.py \
            -x --timeout=10 -q \
            --override-ini="addopts=" \
            --override-ini="log_cli=false"

  # ── Job 10: Engine Smoke Tests (parallel with beast-mode) ────
  test-engines:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    env:
      FIXOPS_DISABLE_TELEMETRY: "1"
      FIXOPS_API_TOKEN: "ci-test-token"
      FIXOPS_JWT_SECRET: "ci-jwt-secret-for-testing-only-not-production"
      FIXOPS_MODE: "enterprise"
      FIXOPS_SKIP_PATH_SECURITY: "1"
      FIXOPS_DISABLE_RATE_LIMIT: "1"
      FIXOPS_EVIDENCE_KEY: "Zz6A0n4P3skS8F6edSxE2xe50Tzw9uQWGWp9JYG1ChE="
      PYTHONPATH: suite-api:suite-core:suite-attack:suite-feeds:suite-evidence-risk:suite-integrations:.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt 2>/dev/null || true
      - name: Run engine smoke tests
        run: |
          python -m pytest tests/test_*_engine.py \
            --timeout=10 -q --tb=short \
            --override-ini="addopts=" \
            --override-ini="log_cli=false"

  # ── Job 11: Active UI Build (aldeci-ui-new) ──────────────────
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: suite-ui/aldeci-ui-new/package-lock.json
      - name: Install dependencies
        working-directory: suite-ui/aldeci-ui-new
        run: npm ci
      - name: Build production bundle
        working-directory: suite-ui/aldeci-ui-new
        env:
          VITE_API_URL: ""
        run: npm run build
      - name: Verify build output
        run: |
          if [ -f suite-ui/aldeci-ui-new/dist/index.html ]; then
            echo "Build succeeded"
            echo "Files: $(find suite-ui/aldeci-ui-new/dist -type f | wc -l)"
            echo "Size: $(du -sh suite-ui/aldeci-ui-new/dist | cut -f1)"
          else
            echo "Build output missing"
            exit 1
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aldeci-ui-dist
          path: suite-ui/aldeci-ui-new/dist/
          retention-days: 7
