# Dependabot version update configuration — ALDECI (SPEC-009 / REQ-009-02)
#
# Fixes: package-ecosystem was "" (empty) — dependabot was not scanning.
# Now covers: pip (Python), npm (UI), github-actions (CI).
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── Python dependencies ────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "DevOpsMadDog"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(pip)"
    # Group minor + patch Python updates to reduce PR noise
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ── Node / npm (active UI: suite-ui/aldeci-ui-new) ─────────────────────────
  - package-ecosystem: "npm"
    directory: "/suite-ui/aldeci-ui-new"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "DevOpsMadDog"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm)"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "DevOpsMadDog"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions)"
