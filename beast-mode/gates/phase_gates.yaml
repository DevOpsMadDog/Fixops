  - name: "Code Coverage"
    type: test
    command: "cd ~/Fixops && python -m pytest tests/ --cov=suite-core --cov=suite-ai --cov-fail-under=75"
    timeout_seconds: 1200

  - name: "Full Type Checking"
    type: type
    command: "cd ~/Fixops && python -m mypy . --ignore-missing-imports --no-implicit-optional --exclude venv"
