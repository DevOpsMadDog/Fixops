  - name: "Code Linting"
    type: lint
    command: "cd ~/Fixops && ruff check suite-ai/ --select=E,W,F"
    timeout_seconds: 120

  - name: "Type Checking"
    type: type
    command: "cd ~/Fixops && python -m mypy suite-ai/ --ignore-missing-imports --no-implicit-optional"
    timeout_seconds: 180

phase_4:
