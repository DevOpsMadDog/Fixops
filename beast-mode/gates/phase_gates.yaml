# Phase Validation Gates — Quality checks between phases
#
# Each phase must pass all gates before progression to the next phase.
# Gates run after phase tasks complete.

phase_1:
  - name: "Connector Framework Tests"
    type: test
    command: "cd ~/Fixops && python -m pytest suite-core/tests/test_connector_framework.py -v --tb=short --timeout=30"
    timeout_seconds: 300
    description: "Verify connector base classes and bridge implementation"

  - name: "TrustGraph Schema Tests"
    type: test
    command: "cd ~/Fixops && python -m pytest suite-core/tests/test_trustgraph.py -v --tb=short --timeout=30"
    timeout_seconds: 300
    description: "Verify TrustGraph schema definitions and queries"

  - name: "Code Linting"
    type: lint
    command: "cd ~/Fixops && ruff check suite-core/connectors/ --select=E,W,F"
    timeout_seconds: 120
    description: "Ensure code quality and style compliance"

  - name: "Type Checking"
    type: type
    command: "cd ~/Fixops && python -m mypy suite-core/connectors/ --ignore-missing-imports --no-implicit-optional"
    timeout_seconds: 180
    description: "Verify type annotations and type safety"

phase_2:
  - name: "PULL Connector Integration Tests"
    type: test
    command: "cd ~/Fixops && python -m pytest suite-core/tests/test_pull_connectors.py -v --tb=short --timeout=60"
    timeout_seconds: 600
    description: "Test all 20 PULL connectors with bidirectional sync"

  - name: "n8n Deployment Tests"
    type: test
    command: "cd ~/Fixops && python -m pytest suite-core/tests/test_n8n_integration.py -v --tb=short --timeout=45"
    timeout_seconds: 600
    description: "Verify n8n orchestration and webhook connectivity"

  - name: "Code Linting"
    type: lint
    command: "cd ~/Fixops && ruff check suite-core/ --select=E,W,F"
    timeout_seconds: 120

  - name: "Type Checking"
    type: type
    command: "cd ~/Fixops && python -m mypy suite-core/ --ignore-missing-imports --no-implicit-optional"
    timeout_seconds: 180

phase_3:
