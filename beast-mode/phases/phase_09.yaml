name: "Pilot Preparation"
description: "Staging deployment, customer data import, monitoring dashboards, runbooks"
days: "43-49"
tasks:
  - id: "9.1"
    name: "Set up staging environment infrastructure"
    prompt: |
      In ~/Fixops/deploy/staging/, create staging infrastructure:
      1. Provision staging environment:
         - Cloud infrastructure (AWS/GCP/Azure): VPC, EC2 instances, RDS
         - Database: PostgreSQL (same version as production)
         - Cache: Redis (same version as production)
         - Containers: Docker Compose or Kubernetes
      2. Configure staging services:
         - Backend API: same code as production
         - Frontend: same code as production
         - n8n orchestration: test workflows
         - Database replicas for testing
      3. Create staging-specific configurations:
         - Staging URLs
         - Staging credentials/secrets
         - Staging API keys for test data sources
      4. Set up monitoring and logging:
         - CloudWatch/Stackdriver/DataDog agent
         - Application logging
         - Database monitoring
      5. Create health checks for all services
      Verify all staging services are operational and accessible.
    parallel_group: "a"
    timeout_minutes: 90

  - id: "9.2"
    name: "Create data migration and import pipeline"
    prompt: |
      In ~/Fixops/data/, create customer data migration tools:
      1. Build data import framework:
         - Support multiple input formats: CSV, JSON, API
         - Validate data against schema
         - Handle data type conversions
         - Implement batch import (chunking for large datasets)
      2. Create import mapping:
         - Map source fields to TrustGraph schema
         - Handle missing/extra fields
         - Apply data transformations
      3. Implement import validation:
         - Verify all required fields present
         - Validate field values (format, type, range)
         - Check for duplicate records
         - Report validation errors
      4. Create import preview:
         - Show first N records before importing
         - Display validation errors
         - Allow user to fix issues
      5. Create import status tracking:
         - Track import progress
         - Show which records failed and why
         - Allow retry for failed records
      6. Write tests in tests/migration/test_import.py
      Test import with various data formats and sizes.
    parallel_group: "a"
    timeout_minutes: 80

  - id: "9.3"
    name: "Build monitoring dashboards"
    prompt: |
      In ~/Fixops/deploy/monitoring/, create monitoring infrastructure:
      1. Set up metrics collection:
         - Prometheus for metrics
         - Grafana for visualization
         - Application instrumentation (StatsD/Prometheus client)
      2. Create dashboards:
         - System health: CPU, memory, disk, network
         - Application: request latency, throughput, errors
         - Database: connections, queries, replication lag
         - Cache: hit rate, memory usage
         - AI: queries/hour, cost, model usage
      3. Implement alerting:
         - Critical alerts: page on-call immediately
           * Service down, database down, error rate >1%
         - Warning alerts: email/Slack notification
           * High latency (>1s p95), high error rate (>0.1%)
           * Approaching quota limits
         - Info alerts: log for visibility
           * Successful backups, deployments
      4. Create alert routing:
         - On-call schedule
         - Escalation policy
         - Notification channels (email, Slack, PagerDuty)
      5. Set up logging:
         - Centralized log aggregation (ELK stack)
         - Log retention (30 days hot, 1 year cold)
      Verify all dashboards show meaningful data.
    parallel_group: "a"
    timeout_minutes: 80

  - id: "9.4"
    name: "Create operational runbooks"
    prompt: |
      In ~/Fixops/docs/runbooks/, create procedures for common operations:
      1. Create runbooks for:
         - Starting/stopping the system
         - Scaling up/down (add/remove instances)
         - Database backup/restore
         - Deploying code changes
         - Rolling back a deployment
         - Debugging high latency
         - Debugging high error rates
         - Scaling the cache layer
         - Handling database failover
      2. For each runbook:
         - Clear step-by-step instructions
         - What to check before/after
         - Common issues and solutions
         - Rollback procedure
         - Escalation contacts
      3. Create troubleshooting decision trees:
         - Service is down -> check X -> try Y -> escalate
         - Slow queries -> check indices -> cache -> scale
      4. Create maintenance checklists:
         - Monthly: verify backups, rotate logs
         - Quarterly: test disaster recovery
         - Annually: security audit, capacity planning
      Review runbooks with operations team.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "9.5"
    name: "Implement automated health checks"
    prompt: |
      In ~/Fixops/deploy/health/, create health check system:
      1. Create health check endpoints:
         - GET /health -> simple status (200 if ok, 503 if degraded)
         - GET /health/detailed -> component status
           * API: ok/error
           * Database: ok/error, latency, connections
           * Cache: ok/error, latency, memory
           * n8n: ok/error
      2. Implement synthetic monitors:
         - Create test account monthly
         - Run test sync every 5 minutes
         - Query API endpoints
         - Alert if any monitor fails
      3. Create availability dashboards:
         - Uptime % (target: 99.9%)
         - Component health status
         - Response time trends
      4. Implement service dependencies:
         - Document which services depend on which
         - Create cascading health checks
      5. Write tests in tests/monitoring/test_health_checks.py
      Test health checks with various failure scenarios.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "9.6"
    name: "Create pilot customer onboarding playbook"
    prompt: |
      In ~/Fixops/docs/, create onboarding_playbook.md:
      1. Define pilot phase goals:
         - Test system with real customer data
         - Validate 30 persona workflows
         - Measure system performance under real load
         - Identify and fix issues before GA
      2. Create customer selection criteria:
         - Industry (target 2-3 industries)
         - Company size (SMB, mid-market, enterprise)
         - Use cases (sales, marketing, ops, finance)
      3. Define onboarding process:
         - Week 1: Setup and initial configuration
         - Week 2: Data migration and sync testing
         - Week 3-4: User testing and feedback collection
         - Week 5-8: Refinement and optimization
      4. Create success metrics:
         - Sync success rate >99%
         - AI decision quality rated 4/5 or higher
         - Onboarding time <2 hours
         - User satisfaction >80%
      5. Create feedback collection procedures:
         - Weekly check-in calls
         - In-app feedback forms
         - NPS survey
         - Bug reporting process
      Review playbook with customer success team.
    parallel_group: "b"
    timeout_minutes: 50

  - id: "9.7"
    name: "Implement automated backup and disaster recovery testing"
    prompt: |
      In ~/Fixops/deploy/, enhance backup and DR:
      1. Create automated backup testing:
         - Run daily: take backup, restore to test DB, verify data
         - Run weekly: full restore in separate environment
         - Verify restoration can complete in <4 hours (RTO)
         - Verify data loss is <24 hours (RPO)
      2. Implement backup verification:
         - Integrity checks (CRC, checksums)
         - Consistency checks (foreign keys, constraints)
         - Completeness check (all tables present)
      3. Create disaster recovery simulation:
         - Monthly: simulate primary failure
         - Promote replica to primary
         - Verify all data and functionality accessible
         - Measure RTO and RPO
      4. Document all procedures in docs/disaster_recovery.md
      5. Create automated DR test script in deploy/scripts/dr_test.sh
      Run full DR simulation; verify RTO and RPO targets met.
    parallel_group: "c"
    timeout_minutes: 70

  - id: "9.8"
    name: "Create knowledge base and FAQ"
    prompt: |
      In ~/Fixops/docs/, build comprehensive knowledge base:
      1. Create FAQ.md with common questions:
         - How do I get started?
         - What connectors do you support?
         - How often does data sync?
         - How accurate are AI decisions?
         - What happens to my data?
         - How do I export my data?
      2. Create troubleshooting guides:
         - Connector connection issues
         - Data sync problems
         - AI decision quality issues
         - Performance issues
      3. Create best practices guide:
         - Data organization
         - Connector configuration
         - Query optimization
         - Cost optimization
      4. Create glossary of terms
      Review knowledge base for completeness.
    parallel_group: "c"
    timeout_minutes: 50

  - id: "9.9"
    name: "Set up support infrastructure"
    prompt: |
      In ~/Fixops/deploy/, create customer support system:
      1. Choose support platform (Zendesk, Intercom, etc.)
      2. Create support workflows:
         - Bug reports -> engineering
         - Feature requests -> product
         - General questions -> knowledge base + support team
         - Urgent issues -> on-call engineer
      3. Create support SLAs:
         - Critical: 1hr response, 4hr resolution target
         - High: 4hr response, 24hr resolution target
         - Medium: 24hr response, 48hr resolution target
         - Low: 48hr response, 1 week resolution target
      4. Create support escalation procedures
      5. Set up notification system for support alerts
      6. Create support team training materials
      Test support system with test tickets.
    parallel_group: "c"
    timeout_minutes: 60

  - id: "9.10"
    name: "Pilot phase validation and readiness assessment"
    prompt: |
      Perform comprehensive pilot readiness assessment:
      1. Verify staging environment:
         - All services operational
         - Data migration pipeline tested
         - Monitoring and alerting working
         - Health checks passing
      2. Verify operational readiness:
         - Runbooks complete and reviewed
         - On-call rotation configured
         - Escalation procedures defined
         - Incident response team trained
      3. Verify customer readiness:
         - Pilot customers identified and ready
         - Onboarding playbook finalized
         - Success metrics defined
         - Support team trained
      4. Create pilot_readiness_checklist.md:
         - Infrastructure: ✓
         - Operations: ✓
         - Support: ✓
         - Monitoring: ✓
         - Customer readiness: ✓
      5. Get sign-off from engineering, ops, and customer success
      Verify all pilot readiness criteria met before proceeding to Phase 10.
    parallel_group: "c"
    timeout_minutes: 90
