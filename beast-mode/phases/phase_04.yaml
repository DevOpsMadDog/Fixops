name: "Integration + Testing"
description: "Full pipeline E2E testing, 30 persona validation, performance benchmarks"
days: "11-14"
tasks:
  - id: "4.1"
    name: "Build end-to-end pipeline test suite"
    prompt: |
      In ~/Fixops/tests/e2e/, create `test_full_pipeline.py`:
      1. Define test scenarios that exercise entire flow:
         - Scenario 1: User connects Salesforce -> syncs data -> queries via AI -> gets decision
         - Scenario 2: Multi-connector enrichment (Salesforce + HubSpot -> TrustGraph)
         - Scenario 3: Bidirectional sync with conflict resolution
         - Scenario 4: Webhook-triggered workflow execution
      2. For each scenario:
         - Set up mock connectors with test data
         - Execute sync operations
         - Run AI queries against TrustGraph
         - Verify final state matches expectations
      3. Add performance assertions (e.g., end-to-end latency <5s)
      4. Implement cleanup to ensure idempotence
      5. Use pytest fixtures for common setup
      Run full pipeline tests; all scenarios must pass.
    parallel_group: "a"
    timeout_minutes: 90

  - id: "4.2"
    name: "Create 30 persona E2E test scenarios"
    prompt: |
      In ~/Fixops/tests/e2e/personas/, create 30 detailed persona tests:
      Personas: Sales Manager, Customer Success, Marketing Manager, Operations, Finance, CEO,
               DevOps, Data Analyst, Product Manager, Support Agent, etc. (30 total)

      For each persona, create tests/e2e/personas/{persona_id}.py:
      1. Define persona context (role, responsibilities, typical workflows)
      2. Create 3-5 test cases representing typical tasks:
         Example for Sales Manager:
         - "Find high-value opportunities in TrustGraph"
         - "Get AI recommendation for deal strategy"
         - "Sync customer updates back to Salesforce"
      3. For each test case:
         - Set up preconditions (data in TrustGraph)
         - Execute persona workflow (API calls)
         - Verify results match expectations
         - Check that AI recommendations are relevant
      4. Add assertions for usability (UI renders, buttons visible)
      5. Measure workflow completion time

      Run all 30 persona tests; each must pass independently.
    parallel_group: "a"
    timeout_minutes: 120

  - id: "4.3"
    name: "Implement performance benchmarking suite"
    prompt: |
      In ~/Fixops/tests/perf/, create `benchmarks.py`:
      1. Define performance benchmarks:
         - TrustGraph query latency (find_neighbors): <10ms for 1k nodes
         - Sync throughput: >5k records/sec per connector
         - AI query latency: <2s for simple queries, <10s for Opus escalation
         - API endpoint latency: p95 <500ms
      2. Implement benchmark runners:
         - bench_graph_queries(): various graph patterns
         - bench_sync_throughput(): sync N records, measure time
         - bench_ai_latency(): submit queries, measure response times
         - bench_api_endpoints(): hammer endpoints, measure latency distribution
      3. Generate baseline metrics in metrics/phase4_benchmarks.json
      4. Compare against phase 2 baseline; ensure no regressions
      5. Use pytest-benchmark for statistical rigor
      Run benchmarks; verify all targets are met.
    parallel_group: "a"
    timeout_minutes: 120

  - id: "4.4"
    name: "Build comprehensive test coverage reporting"
    prompt: |
      In ~/Fixops/tests/, create coverage infrastructure:
      1. Configure pytest with coverage tracking:
         - suite-core target: >85% coverage
         - suite-ai target: >80% coverage
         - suite-frontend target: >75% coverage
      2. Exclude from coverage: migrations, generated code, test files
      3. Create coverage badge in README
      4. Implement pre-commit hook to check coverage doesn't decrease
      5. Generate coverage reports in HTML and JSON
      6. Create coverage dashboard showing trending over time
      Run full test suite with coverage; all targets must be met.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "4.5"
    name: "Create regression test suite"
    prompt: |
      In ~/Fixops/tests/regression/, create regression tests:
      1. Document all known bugs/fixes from previous phases
      2. For each bug, create a test that would fail without the fix
      3. Test categories:
         - Connector edge cases (missing fields, null values, type mismatches)
         - Normalizer schema mismatches
         - TrustGraph query edge cases
         - AI decision inconsistencies
         - Race conditions in sync operations
      4. Add regression test for each bug report
      5. Ensure all regression tests run automatically
      Run regression tests; all must pass to prevent re-introduction of bugs.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "4.6"
    name: "Implement load testing with k6"
    prompt: |
      In ~/Fixops/tests/load/, create k6 load tests:
      1. Define load test scenarios:
         - scenario_gradual_ramp: 0->100 VUs over 5min, sustain 100 VUs for 10min
         - scenario_spike: constant 50 VUs, spike to 200 VUs for 30s
         - scenario_soak: 10 VUs running for 1 hour
      2. For each scenario, test:
         - GET /api/connectors (list)
         - POST /api/connectors/{id}/sync (start sync)
         - GET /api/trustgraph/query (graph query)
         - POST /ai/query (AI council query)
      3. Assertions for load test:
         - Error rate <0.1%
         - p95 latency <2s under load
         - No memory leaks (memory growth <5%)
      4. Generate load test report in metrics/phase4_load_test.json
      Run load tests; verify system handles intended capacity.
    parallel_group: "b"
    timeout_minutes: 150

  - id: "4.7"
    name: "Security testing and SAST"
    prompt: |
      In ~/Fixops/tests/security/, create security tests:
      1. Run SAST on codebase:
         - Use bandit for Python code (check for hardcoded secrets, SQL injection)
         - Use semgrep for additional pattern matching
         - Fix all HIGH and CRITICAL issues
      2. Test authentication:
         - JWT token validation
         - Expired token rejection
         - Invalid signature rejection
      3. Test authorization:
         - Users can't access other orgs' data
         - Users can't escalate privileges
      4. Test input validation:
         - SQL injection attempts blocked
         - XSS attempts blocked
         - Large inputs truncated appropriately
      5. Create security test cases for each endpoint
      Run security tests; fix all issues found.
    parallel_group: "b"
    timeout_minutes: 90

  - id: "4.8"
    name: "Create integration test documentation"
    prompt: |
      In ~/Fixops/docs/, create testing.md:
      1. How to run tests locally (pytest, k6 load tests, etc.)
      2. How to run tests in CI/CD pipeline
      3. How to write new tests (fixtures, mocking, assertions)
      4. How to interpret test results and logs
      5. Known flaky tests and how to debug them
      6. Performance benchmark baseline and targets
      7. Security testing checklist
      Add examples of well-written tests.
    parallel_group: "c"
    timeout_minutes: 40

  - id: "4.9"
    name: "Set up CI/CD pipeline integration"
    prompt: |
      In ~/Fixops/.github/workflows/, create CI/CD workflows:
      1. test.yml: Run on every PR
         - Run unit tests (pytest)
         - Run linting (ruff)
         - Run type checking (mypy)
         - Enforce coverage thresholds
      2. integration-test.yml: Run on merge to develop
         - Run full integration test suite
         - Run 30 persona E2E tests
         - Check performance (no regressions)
      3. performance.yml: Run nightly
         - Run benchmarks
         - Run load tests
         - Generate performance reports
      4. security.yml: Run on security-related PRs
         - Run SAST scans
         - Check dependency vulnerabilities
      Configure GitHub branch protection to require CI passing.
    parallel_group: "c"
    timeout_minutes: 50

  - id: "4.10"
    name: "Final Phase 4 validation and reporting"
    prompt: |
      Create comprehensive Phase 4 validation report:
      1. Run full test suite: unit + integration + E2E + load tests
      2. Generate coverage report: verify all targets met
      3. Run benchmarks: confirm performance targets achieved
      4. Run all 30 persona E2E tests: verify all pass
      5. Create phase_4_report.md with:
         - Test results summary
         - Coverage metrics
         - Performance benchmarks
         - Known issues (if any)
         - Recommendations for Phase 5
      6. Archive all test results and benchmarks to metrics/ directory
      Verify all tests pass and coverage targets met before gate approval.
    parallel_group: "c"
    timeout_minutes: 120
