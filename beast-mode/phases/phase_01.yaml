name: "Core Engine Foundation"
description: "Wire existing connectors to framework, build TrustGraph schemas, bridge normalizers"
days: "1-3"
tasks:
  - id: "1.1"
    name: "Wire 13 PULL connectors to PullConnector base"
    prompt: |
      In ~/Fixops/suite-core/connectors/, create a new file `connector_bridge.py` that:
      1. Defines a PullConnector base class inheriting from BaseConnector
      2. Implements abstract methods: normalize_schema(), poll(), validate_credentials()
      3. Wire all 13 existing PULL connectors (Salesforce, HubSpot, Marketo, Klaviyo, etc.)
         to this base via adapter pattern
      4. Add comprehensive type hints and docstrings
      5. Create unit tests in suite-core/tests/test_connector_framework.py
      Run tests to verify all connectors properly inherit and override required methods.
    parallel_group: "a"
    timeout_minutes: 45

  - id: "1.2"
    name: "Define TrustGraph schema models"
    prompt: |
      In ~/Fixops/suite-core/models/, create `trustgraph.py` with:
      1. Define TrustNode, TrustEdge, TrustGraph dataclasses with full type hints
      2. Node types: Account, Contact, Opportunity, Deal, Lead, Custom
      3. Edge types: owns, managed_by, belongs_to, linked_to, custom
      4. Implement TrustGraph class with:
         - add_node(), add_edge(), remove_node(), remove_edge()
         - find_path(), find_neighbors(), query_nodes(filter)
         - Serialization methods (to_dict, from_dict, to_json, from_json)
      5. Add comprehensive validation and error handling
      6. Write tests in suite-core/tests/test_trustgraph.py
      Run tests to verify schema structure and query operations.
    parallel_group: "a"
    timeout_minutes: 40

  - id: "1.3"
    name: "Build normalizer bridge"
    prompt: |
      In ~/Fixops/suite-core/normalizers/, create `normalizer_bridge.py`:
      1. Define Normalizer base class with normalize(record) abstract method
      2. Create schema-specific normalizers: SalesforceNormalizer, HubSpotNormalizer, etc.
      3. Implement automatic field mapping: source_schema -> canonical_schema
      4. Add validation rules for data quality (required fields, types, ranges)
      5. Create a NormalizerRegistry that auto-loads all normalizers
      6. Wire normalizers to connectors in connector_bridge.py
      7. Write tests in suite-core/tests/test_normalizer_bridge.py
      Run tests to verify normalization produces consistent canonical records.
    parallel_group: "a"
    timeout_minutes: 45

  - id: "1.4"
    name: "Set up core database models"
    prompt: |
      In ~/Fixops/suite-core/models/, create `database.py`:
      1. Define SQLAlchemy ORM models for: TrustNodes, TrustEdges, Connectors, SyncJobs
      2. Add database indices on frequently-queried columns
      3. Implement migrations using Alembic in suite-core/migrations/
      4. Create base connection pool manager with configurable pool size
      5. Add session factory and context manager helpers
      6. Write integration tests in suite-core/tests/test_database.py
      Verify database schema creation and ORM operations work correctly.
    parallel_group: "b"
    timeout_minutes: 40

  - id: "1.5"
    name: "Build sync job orchestrator"
    prompt: |
      In ~/Fixops/suite-core/sync/, create `orchestrator.py`:
      1. Define SyncJob class tracking status, progress, errors, timestamps
      2. Implement SyncOrchestrator with methods:
         - schedule_sync(connector_id, sync_config)
         - run_sync(sync_job) -> SyncResult
         - Track job progress (% complete, ETA)
         - Handle errors and retries gracefully
      3. Integrate with TrustGraph (update nodes after successful sync)
      4. Add comprehensive logging and monitoring hooks
      5. Write tests in suite-core/tests/test_sync_orchestrator.py
      Run end-to-end sync test with mock connector to validate job flow.
    parallel_group: "b"
    timeout_minutes: 45

  - id: "1.6"
    name: "Create API base layer (FastAPI)"
    prompt: |
      In ~/Fixops/suite-core/api/, create `main.py` with FastAPI app:
      1. Set up FastAPI app with CORS, middleware, exception handlers
      2. Define base routes: /health, /status, /version
      3. Create ConnectorRouter in routes/connectors.py with:
         - GET /connectors (list all)
         - POST /connectors (create)
         - GET /connectors/{id}
         - PUT /connectors/{id}
         - DELETE /connectors/{id}
      4. Add authentication middleware (JWT placeholder)
      5. Implement proper error responses with error codes
      6. Write integration tests in tests/e2e/test_api.py
      Run API server and test all connector endpoints.
    parallel_group: "b"
    timeout_minutes: 40

  - id: "1.7"
    name: "Integration test suite for Phase 1"
    prompt: |
      In ~/Fixops/tests/test_phase2_connectors.py, create comprehensive tests:
      1. Test connector framework: instantiate all 13 connectors, verify inheritance
      2. Test TrustGraph: create nodes/edges, query, validate serialization
      3. Test normalizers: run records through normalizers, verify canonical output
      4. Test database: create sessions, run queries, verify schema
      5. Test sync orchestrator: run mock sync job, verify job tracking and TrustGraph update
      6. Test API: make requests to all connector endpoints, verify responses
      7. Add fixtures for common test data (sample records, mock connectors)
      Run full integration test suite; all must pass with no errors.
    parallel_group: "c"
    timeout_minutes: 50

  - id: "1.8"
    name: "Documentation and inline comments"
    prompt: |
      1. In suite-core/docs/, create architecture.md describing:
         - Connector framework and PullConnector base
         - TrustGraph data model and query API
         - Normalizer bridge and schema mapping
         - Sync orchestration flow
      2. Add comprehensive docstrings to all public classes and functions
      3. Create CONTRIBUTING.md for adding new connectors
      4. Add inline comments explaining complex logic (TrustGraph queries, normalizer rules)
      Verify that docs render properly and all code is well-documented.
    parallel_group: "c"
    timeout_minutes: 30
