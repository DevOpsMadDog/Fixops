name: "Onboarding + UX"
description: "Setup wizard, getting started guide, Copilot improvements, dashboard polish"
days: "36-42"
tasks:
  - id: "8.1"
    name: "Build interactive onboarding wizard"
    prompt: |
      In ~/Fixops/suite-frontend/src/onboarding/, create OnboardingWizard.tsx:
      1. Multi-step wizard flow:
         - Step 1: Welcome and account setup
         - Step 2: Select first connector
         - Step 3: Configure connector (OAuth or API key)
         - Step 4: Map fields to TrustGraph
         - Step 5: Test sync
         - Step 6: Schedule sync
         - Step 7: Invite team members
         - Step 8: Review and complete
      2. For each step:
         - Clear instructions and examples
         - Form validation with helpful errors
         - Progress indicator
         - Ability to skip/come back later
      3. Implement wizard state management (Redux)
      4. Add tooltips and help text
      5. Create mobile-responsive design
      6. Write component tests
      Test wizard flow end-to-end; verify all steps work smoothly.
    parallel_group: "a"
    timeout_minutes: 80

  - id: "8.2"
    name: "Create getting started guide"
    prompt: |
      In ~/Fixops/docs/, create comprehensive getting started guide:
      1. In docs/getting_started.md, create guide with sections:
         - What is ALDECI (2min overview)
         - Quick start (5min): Set up first connector
         - Basic concepts: TrustGraph, connectors, AI decisions
         - Common workflows:
           * Connect 2 connectors and sync data
           * Query TrustGraph to find insights
           * Get AI recommendation
      2. Create interactive tutorials:
         - Video walkthrough (2-3 min each)
         - Step-by-step screenshots
         - Copy-paste commands for CLI operations
      3. Create troubleshooting section:
         - Common issues and fixes
         - FAQ
         - How to contact support
      4. Create glossary of terms
      Review guide for clarity and completeness.
    parallel_group: "a"
    timeout_minutes: 60

  - id: "8.3"
    name: "Enhance Copilot AI assistant"
    prompt: |
      In ~/Fixops/suite-frontend/src/copilot/, enhance Copilot.tsx:
      1. Improve Copilot capabilities:
         - Context awareness: Copilot knows current page/section
         - Proactive suggestions: Suggest next steps based on user behavior
         - Smart search: Help users find features
         - Guided workflows: Walk through common tasks
      2. Implement Copilot features:
         - Floating widget (bottom right)
         - Keyboard shortcut (Cmd+K to open)
         - Command palette for quick actions
         - Natural language intent matching
      3. Add Copilot learning:
         - Track user interactions
         - Improve suggestions over time
         - A/B test different suggestion strategies
      4. Create Copilot training data:
         - Collect user intents and feedback
         - Train classifier for better intent detection
      5. Write tests for Copilot interactions
      Test Copilot with various user intents and scenarios.
    parallel_group: "a"
    timeout_minutes: 70

  - id: "8.4"
    name: "Polish and redesign dashboard"
    prompt: |
      In ~/Fixops/suite-frontend/src/dashboard/, redesign Dashboard.tsx:
      1. Dashboard layout improvements:
         - Hero section: Welcome message and quick actions
         - Status cards: System health, sync status, AI queries
         - Quick actions: Connect new connector, view reports, etc.
         - Recent activity: Latest syncs, decisions, changes
      2. Visual polish:
         - Use consistent color scheme and typography
         - Add icons for visual hierarchy
         - Implement smooth animations and transitions
         - Add dark mode support
      3. Interactive elements:
         - Drag-and-drop card reordering
         - Customizable dashboard (show/hide cards)
         - Drill-down to detailed views
      4. Performance optimization:
         - Lazy load cards
         - Virtual scrolling for long lists
         - Prefetch data for likely user actions
      5. Add accessibility:
         - ARIA labels
         - Keyboard navigation
         - Screen reader support
      Test dashboard with various viewport sizes; ensure responsive design.
    parallel_group: "b"
    timeout_minutes: 70

  - id: "8.5"
    name: "Create connector setup flow UI"
    prompt: |
      In ~/Fixops/suite-frontend/src/connectors/, create ConnectorSetup.tsx:
      1. Improve connector onboarding:
         - Connector selection screen (with descriptions and logos)
         - Credential input (with validation and format hints)
         - OAuth redirect flow (for OAuth connectors)
         - Permission review (show what data will be accessed)
         - Connection test (verify credentials work)
      2. Add connector documentation:
         - Help text for each field
         - Links to provider docs (how to get API key)
         - Troubleshooting for common errors
      3. Implement credential validation:
         - Format validation (e.g., email, URL)
         - Length validation
         - Character validation
      4. Add progress indicators
      5. Create success confirmation and next steps
      Test setup flow with multiple connector types.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "8.6"
    name: "Build help center and search"
    prompt: |
      In ~/Fixops/suite-frontend/src/help/, create HelpCenter.tsx:
      1. Help center features:
         - Searchable knowledge base
         - Categorized articles
         - Popular articles section
         - Recently viewed articles
      2. Implement search:
         - Full-text search across articles
         - Autocomplete suggestions
         - Search analytics (track what users search for)
      3. Create article structure:
         - Title, summary, full content
         - Related articles
         - Feedback (helpful/not helpful)
         - Last updated date
      4. Populate help center with articles:
         - Getting started
         - Connector setup
         - TrustGraph basics
         - AI queries and decisions
         - Troubleshooting
      5. Integrate with Copilot (link to relevant articles)
      Test search functionality and navigation.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "8.7"
    name: "Implement in-app notifications and tour"
    prompt: |
      In ~/Fixops/suite-frontend/src/notifications/, create notification system:
      1. Toast notifications (temporary):
         - Success: "Sync completed"
         - Error: "Failed to connect"
         - Info: "New feature available"
         - Warning: "Approaching quota limit"
      2. Create notification center:
         - List all notifications
         - Mark as read/unread
         - Filter by type/date
         - Clear all
      3. Implement guided tour:
         - Show on first login
         - Highlight key features
         - Step-by-step walkthrough
         - Dismiss/come back later
      4. Add preference center:
         - Choose which notifications to receive
         - Notification delivery (in-app, email, webhook)
         - Quiet hours (no notifications between X-Y)
      5. Write tests for notifications
      Test notifications and tour flow.
    parallel_group: "c"
    timeout_minutes: 60

  - id: "8.8"
    name: "Create user feedback and analytics collection"
    prompt: |
      In ~/Fixops/suite-frontend/src/analytics/, implement analytics:
      1. Track user interactions:
         - Page views
         - Button clicks (which features are used)
         - Form completions
         - Errors encountered
      2. Implement product analytics:
         - Funnel analysis (onboarding completion rate)
         - Cohort analysis (feature adoption by user group)
         - Retention analysis (% of users returning)
      3. Create user feedback mechanisms:
         - In-app feedback form (rate experience)
         - Feature request button
         - Bug report button
      4. Integrate with analytics platform (e.g., Amplitude)
      5. Create analytics dashboard (for product team)
      6. Ensure privacy: anonymize user data, comply with GDPR
      Test analytics collection and dashboard.
    parallel_group: "c"
    timeout_minutes: 50

  - id: "8.9"
    name: "Create user documentation and video tutorials"
    prompt: |
      In ~/Fixops/docs/videos/ and ~/Fixops/docs/guides/, create content:
      1. Video tutorials (1-3 min each):
         - "Getting started with ALDECI"
         - "Connecting your first connector"
         - "Understanding the TrustGraph"
         - "Asking the AI for decisions"
         - "Creating custom workflows"
      2. Written guides (in docs/guides/):
         - User guide (comprehensive)
         - API guide (for developers)
         - Admin guide (user/team management)
         - Security best practices
      3. Add screenshots and diagrams
      4. Create step-by-step walkthroughs
      5. Ensure guides are up-to-date with current UI
      Review documentation for accuracy and completeness.
    parallel_group: "c"
    timeout_minutes: 60

  - id: "8.10"
    name: "UX testing and refinement"
    prompt: |
      In ~/Fixops/tests/e2e/ux/, create UX tests:
      1. Test onboarding experience:
         - Run wizard with various connector types
         - Verify success rate >95%
         - Measure time to complete
      2. Test dashboard usability:
         - Verify all cards load correctly
         - Test interactions (drill-down, reorder, hide)
         - Check performance (page load <2s)
      3. Test help/documentation:
         - Run search tests
         - Verify links work
         - Check readability
      4. Conduct user testing:
         - Get feedback from 5-10 power users
         - Identify usability issues
         - Prioritize fixes
      5. Implement fixes based on feedback
      6. Re-test to verify improvements
      Run full UX test suite; identify and fix usability issues.
    parallel_group: "c"
    timeout_minutes: 80
