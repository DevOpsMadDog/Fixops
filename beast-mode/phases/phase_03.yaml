name: "LLM Council + AI Pipeline"
description: "Implement OllamaProvider, OpenRouterProvider, 3-stage council, Opus CTO escalation"
days: "7-10"
tasks:
  - id: "3.1"
    name: "Build LLM provider abstraction"
    prompt: |
      In ~/Fixops/suite-ai/providers/, create `base.py` and implementations:
      1. Define LLMProvider abstract base class with:
         - complete(prompt: str, model: str, params: dict) -> str
         - chat(messages: List[Message], model: str, params: dict) -> str
         - available_models() -> List[str]
         - estimate_cost(tokens: int) -> float
      2. Implement OllamaProvider:
         - Connect to local Ollama instance (localhost:11434)
         - Support models: mistral, neural-chat, dolphin-mixtral
         - Implement streaming responses
      3. Implement OpenRouterProvider:
         - API key configuration
         - Support multiple models (Claude, GPT-4, Mixtral, Llama2)
         - Implement rate limiting and quota tracking
      4. Create provider registry to select at runtime
      5. Write tests in suite-ai/tests/test_llm_providers.py
      Test both providers with real and mock API calls.
    parallel_group: "a"
    timeout_minutes: 60

  - id: "3.2"
    name: "Implement 3-stage decision council"
    prompt: |
      In ~/Fixops/suite-ai/council/, create `council.py`:
      1. Define Council class with three stages:
         - Stage 1 (Specialist): Route query to domain specialist (LLM with context)
         - Stage 2 (Generalist): Route to general reasoning (broader LLM)
         - Stage 3 (Consensus): Merge recommendations into final decision
      2. Implement routing logic:
         - Detect query type (question, analysis, action)
         - Route to appropriate specialist
      3. Add confidence scoring for each recommendation
      4. Implement disagreement resolution:
         - If confidence varies, escalate to Opus CTO
         - If agreement, return consensus decision
      5. Add context windows (TrustGraph, recent interactions)
      6. Write tests in suite-ai/tests/test_council.py
      Test council with various query types and edge cases.
    parallel_group: "a"
    timeout_minutes: 55

  - id: "3.3"
    name: "Build Opus CTO escalation system"
    prompt: |
      In ~/Fixops/suite-ai/escalation/, create `cto_escalation.py`:
      1. Define CtoEscalation class triggered when:
         - Council disagreement >20% confidence variance
         - Query complexity score >0.7
         - Specialist/Generalist recommendation conflict
      2. Implement Opus-specific prompt that includes:
         - Full context (TrustGraph state)
         - Specialist and Generalist recommendations
         - Confidence scores and reasoning
         - Request for executive decision and explanation
      3. Add escalation logging and audit trail
      4. Cache Opus decisions for similar queries (1hr TTL)
      5. Measure Opus cost and usage
      6. Write tests in suite-ai/tests/test_cto_escalation.py
      Test escalation triggering and Opus decision quality.
    parallel_group: "a"
    timeout_minutes: 50

  - id: "3.4"
    name: "Create prompt engineering framework"
    prompt: |
      In ~/Fixops/suite-ai/prompts/, create prompt templates:
      1. specialist_prompt.txt: Context-aware specialist prompt template
         - Instructions for domain-specific reasoning
         - Relevant TrustGraph data as context
         - Expected output format (JSON)
      2. generalist_prompt.txt: Broader reasoning prompt
      3. cto_prompt.txt: Executive decision prompt
      4. Create PromptManager class to load, interpolate, cache prompts
      5. Add prompt versioning to track changes
      6. Implement A/B testing framework for prompt variants
      7. Write tests in suite-ai/tests/test_prompts.py
      Test prompt loading, interpolation, and output parsing.
    parallel_group: "b"
    timeout_minutes: 40

  - id: "3.5"
    name: "Build AI API endpoints"
    prompt: |
      In ~/Fixops/suite-ai/api/routes/, create `ai.py`:
      1. POST /ai/query - Submit query to council
         - Input: { query, context, priority }
         - Output: { decision, reasoning, confidence, cost }
      2. POST /ai/chat - Multi-turn conversation
         - Input: { messages, context, persona }
         - Output: { response, next_steps }
      3. GET /ai/models - List available models
      4. POST /ai/feedback - Log user feedback for Opus caching
      5. GET /ai/status - Health check and cost summary
      6. Add rate limiting (per user, per IP)
      7. Write tests in suite-ai/tests/test_ai_api.py
      Test all endpoints with various query types.
    parallel_group: "b"
    timeout_minutes: 45

  - id: "3.6"
    name: "Implement context awareness (TrustGraph integration)"
    prompt: |
      In ~/Fixops/suite-ai/context/, create `context_builder.py`:
      1. Define ContextBuilder to enrich AI queries with:
         - Current user/account profile
         - Recent TrustGraph updates
         - Connected connectors and their data
         - Historical decisions (for consistency)
      2. Implement context window limiting (max 2k tokens for context)
      3. Add context caching with 5min TTL
      4. Create context versioning to track changes
      5. Implement privacy filtering (mask sensitive data)
      6. Write tests in suite-ai/tests/test_context_builder.py
      Test context building with various TrustGraph states.
    parallel_group: "b"
    timeout_minutes: 40

  - id: "3.7"
    name: "Build AI monitoring and cost tracking"
    prompt: |
      In ~/Fixops/suite-ai/monitoring/, create `cost_tracker.py`:
      1. Track costs per:
         - LLM provider (Ollama free, OpenRouter paid, Opus premium)
         - Query type
         - User/organization
      2. Implement quota management:
         - Set monthly budget per org
         - Alert when approaching limit
         - Throttle queries when budget exceeded
      3. Create AiMetrics class:
         - queries_per_hour, avg_latency, cost_per_query
         - Model usage breakdown
         - Escalation rate
      4. Add AiCostDashboard endpoint
      5. Write tests in suite-ai/tests/test_cost_tracking.py
      Test cost calculation and quota enforcement.
    parallel_group: "c"
    timeout_minutes: 40

  - id: "3.8"
    name: "Create AI playground for testing"
    prompt: |
      In ~/Fixops/suite-frontend/src/, create AiPlayground.tsx:
      1. Query builder UI:
         - Text input for query
         - Context selector (TrustGraph, connectors)
         - Model/provider selector
         - Advanced settings (temperature, max_tokens)
      2. Response viewer:
         - Display council stage results
         - Show specialist/generalist recommendations
         - Highlight if escalated to Opus
         - Show cost estimate
      3. History panel:
         - Recent queries and responses
         - Copy/share buttons
         - Feedback mechanism
      4. Add syntax highlighting and formatting
      5. Write component tests
      Test UI with various query types and responses.
    parallel_group: "c"
    timeout_minutes: 45

  - id: "3.9"
    name: "Integration tests for AI Pipeline"
    prompt: |
      In ~/Fixops/tests/test_ai_pipeline.py, create comprehensive tests:
      1. Test LLM providers:
         - Ollama: verify local instance connectivity
         - OpenRouter: test API authentication and model availability
         - Provider fallback (use Ollama if OpenRouter fails)
      2. Test 3-stage council:
         - Route queries correctly to specialists
         - Generate consensus decisions
         - Calculate confidence properly
      3. Test Opus escalation:
         - Trigger on disagreement
         - Verify Opus decision quality
         - Check caching works
      4. Test context building:
         - Enrich queries with TrustGraph data
         - Verify privacy filtering
         - Check context size limits
      5. Test cost tracking:
         - Calculate costs accurately
         - Enforce quotas
         - Generate usage reports
      6. Test API endpoints:
         - /ai/query, /ai/chat, /ai/models
         - Rate limiting enforcement
         - Proper error responses

      Run full AI pipeline test suite; all tests must pass.
    parallel_group: "c"
    timeout_minutes: 90

  - id: "3.10"
    name: "Documentation for AI system"
    prompt: |
      Create documentation in ~/Fixops/docs/:
      1. ai_architecture.md: Overview of council, providers, escalation
      2. ai_api.md: API endpoint reference
      3. prompt_engineering.md: How to write and test prompts
      4. cost_optimization.md: Tips for reducing AI costs
      5. Add example queries and expected responses
      6. Create decision flow diagram (council -> Opus escalation)
      7. Document all LLM providers and their capabilities
      Verify docs are clear and complete.
    parallel_group: "c"
    timeout_minutes: 30
