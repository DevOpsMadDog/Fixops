name: "Security + Compliance"
description: "OWASP ZAP scan, dependency audit, SOC2 evidence, HIPAA controls"
days: "29-35"
tasks:
  - id: "7.1"
    name: "Run OWASP ZAP security scan"
    prompt: |
      In ~/Fixops/deploy/scripts/, create and run security scan:
      1. Set up OWASP ZAP (standalone or containerized)
      2. Create owasp_zap_scan.sh script:
         - Start ZAP server
         - Run spider against all endpoints
         - Run active scanner with HIGH/CRITICAL plugins only
         - Timeout: 30 minutes per scan
      3. Configure ZAP to test:
         - XSS vulnerabilities
         - SQL injection
         - CSRF protection
         - Insecure headers
         - Broken authentication
         - Sensitive data exposure
      4. Generate HTML/JSON report
      5. Fail build if any HIGH/CRITICAL issues found
      6. Create suppression list for false positives
      Run OWASP ZAP scan; fix all HIGH/CRITICAL findings; LOW/MEDIUM can be documented.
    parallel_group: "a"
    timeout_minutes: 90

  - id: "7.2"
    name: "Dependency vulnerability audit"
    prompt: |
      In ~/Fixops/, create dependency security scanning:
      1. Run Python dependency audit:
         - Use `pip audit` to check for known vulnerabilities
         - Use `poetry audit` if using Poetry
         - Check all dependencies (direct and transitive)
      2. Configure security scanning in CI/CD:
         - Fail on HIGH/CRITICAL vulnerabilities
         - Warn on MEDIUM (can be reviewed)
         - Ignore LOW (unless widespread)
      3. Create dependency update policy:
         - Security patches: apply immediately
         - Minor updates: monthly
         - Major updates: quarterly
      4. Set up Dependabot or similar for automated PRs
      5. Document approval process for dependencies
      Run audit; fix all HIGH/CRITICAL vulnerabilities; update vulnerable dependencies.
    parallel_group: "a"
    timeout_minutes: 60

  - id: "7.3"
    name: "Implement HIPAA compliance controls"
    prompt: |
      In ~/Fixops/suite-core/compliance/, create HIPAA controls:
      1. Define Protected Health Information (PHI) fields:
         - Patient names, SSNs, medical record numbers
         - Diagnostic codes, treatment plans
         - Medication names, dosages
      2. Implement automatic PHI detection and encryption:
         - Regex patterns for SSNs, MRNs
         - Field-level encryption for identified PHI
         - Audit all access to PHI
      3. Create access controls for PHI:
         - PHI access requires explicit permissions
         - All PHI access logged and auditable
         - PHI can't be exported without approval
      4. Implement data retention:
         - Minimum retention period (7 years for medical)
         - Secure deletion after retention period
      5. Create breach notification procedures:
         - Detect unauthorized PHI access
         - Notify affected individuals within 60 days
      6. Write tests in suite-core/tests/test_hipaa_compliance.py
      Test PHI detection, encryption, and access controls.
    parallel_group: "a"
    timeout_minutes: 70

  - id: "7.4"
    name: "Implement SOC2 controls and evidence collection"
    prompt: |
      In ~/Fixops/deploy/, create SOC2 control evidence:
      1. Design SOC2 controls across 5 trust areas:
         - CC (Common Criteria): Data security, system availability
         - A (Availability): System uptime, disaster recovery
         - P (Processing Integrity): Accurate transactions, data integrity
         - C (Confidentiality): Access controls, encryption
         - PI (Privacy): Data handling, consent, notices
      2. Implement control evidence collection:
         - Access logs (who accessed what, when)
         - Change logs (what changed, who changed it, when)
         - Incident logs (security incidents, resolutions)
         - Backup logs (backup success, restore testing)
         - Configuration management (approved changes only)
      3. Create audit scripts in deploy/scripts/:
         - validate_soc2_controls.py: verify all controls implemented
         - collect_evidence.py: gather audit logs and reports
      4. Store evidence in secure archive (immutable)
      5. Create SOC2 readiness checklist
      6. Document all controls in compliance/soc2_controls.md
      Run validation; fix any control gaps; collect evidence.
    parallel_group: "b"
    timeout_minutes: 70

  - id: "7.5"
    name: "Build data privacy and GDPR compliance"
    prompt: |
      In ~/Fixops/suite-core/privacy/, create GDPR controls:
      1. Implement data subject rights:
         - Right to access: GET /api/user/data (export all user data)
         - Right to be forgotten: DELETE /api/user/data (securely erase)
         - Right to rectification: PUT /api/user/data (correct inaccuracies)
         - Right to data portability: GET /api/user/data/export (JSON format)
      2. Create consent management:
         - Track user consent for data processing
         - Maintain audit trail of consents
         - Revoke consent (stop processing)
      3. Implement Data Processing Agreement (DPA):
         - Document data flows
         - Identify data processors
         - Define retention periods
      4. Create privacy notices:
         - Privacy policy (comprehensive)
         - Cookie notice (for web)
         - Privacy controls (user-facing)
      5. Implement automatic data retention:
         - Delete data after retention period
         - Secure deletion (overwrite 3x)
      6. Write tests in suite-core/tests/test_gdpr_compliance.py
      Test data export, deletion, and consent management.
    parallel_group: "b"
    timeout_minutes: 60

  - id: "7.6"
    name: "Create security testing suite"
    prompt: |
      In ~/Fixops/tests/security/, create security test cases:
      1. Authentication testing:
         - Test JWT token validation
         - Test expired token rejection
         - Test invalid signature rejection
         - Test revoked token rejection
      2. Authorization testing:
         - Test RBAC enforcement
         - Test multi-tenancy isolation
         - Test data scope enforcement
      3. Input validation testing:
         - Test SQL injection prevention
         - Test XSS prevention
         - Test command injection prevention
         - Test XXE prevention
      4. Sensitive data testing:
         - Verify credentials not logged
         - Verify API keys not exposed
         - Verify PII encrypted in DB
      5. API security testing:
         - Test CORS headers
         - Test CSRF tokens
         - Test rate limiting
         - Test request validation
      6. Cryptography testing:
         - Verify HTTPS/TLS usage
         - Verify no hardcoded secrets
         - Verify secure key storage
      Run all security tests; all must pass.
    parallel_group: "b"
    timeout_minutes: 70

  - id: "7.7"
    name: "Implement secrets rotation and management"
    prompt: |
      In ~/Fixops/deploy/, implement secrets rotation:
      1. Create automated rotation for:
         - Database credentials (every 90 days)
         - API keys (every 180 days)
         - SSL certificates (every 30 days before expiry)
      2. Implement rotation workflow:
         - Generate new secret
         - Update consumer (DB, app, etc.)
         - Verify new secret works
         - Deprecate old secret after grace period
      3. Create rotate_secrets.py script:
         - List secrets due for rotation
         - Execute rotation for each
         - Verify rotation success
         - Alert on rotation failures
      4. Document all secret rotation procedures
      5. Test rotation with all secret types
      Test secret rotation without service downtime.
    parallel_group: "c"
    timeout_minutes: 60

  - id: "7.8"
    name: "Create incident response playbook"
    prompt: |
      In ~/Fixops/docs/, create incident response procedures:
      1. Create incident_response.md with procedures for:
         - Data breach detection and response
         - Security incident escalation
         - Customer notification
         - Law enforcement notification (if required)
         - Post-incident review
      2. Create security incident templates:
         - Incident report template
         - Timeline template
         - Root cause analysis template
      3. Define incident severity levels:
         - Critical (>10k users affected, data breach)
         - High (1-10k users affected, major functionality down)
         - Medium (<1k users affected, some data exposure)
         - Low (no user impact, potential issue)
      4. Create on-call procedures and contact list
      5. Document communication templates
      6. Create checklist for incident response
      Review playbook with security team; ensure clarity.
    parallel_group: "c"
    timeout_minutes: 40

  - id: "7.9"
    name: "Security training and documentation"
    prompt: |
      In ~/Fixops/docs/, create security documentation:
      1. Create security.md with:
         - Security architecture overview
         - Threat model and mitigations
         - Security controls and verification
         - Incident response procedures
      2. Create developer_security.md:
         - Secure coding practices
         - Common vulnerabilities to avoid
         - How to report security issues
         - Security testing requirements
      3. Create operations_security.md:
         - Access management
         - Key management
         - Log monitoring and alerting
         - Incident response
      4. Create privacy.md:
         - Data handling requirements
         - Consent management
         - Data retention and deletion
         - User privacy rights
      5. Add security awareness training outline
      Review documentation with security/compliance team.
    parallel_group: "c"
    timeout_minutes: 40

  - id: "7.10"
    name: "Final security and compliance validation"
    prompt: |
      Create comprehensive security validation:
      1. Run all security tests:
         - OWASP ZAP scan (zero HIGH/CRITICAL)
         - Dependency audit (zero HIGH/CRITICAL)
         - Custom security tests (100% pass)
      2. Verify all compliance controls:
         - HIPAA: PHI detection, encryption, audit
         - SOC2: all control evidence collected
         - GDPR: data rights implemented
      3. Create phase_7_security_report.md with:
         - Vulnerability scan results
         - Dependency audit results
         - Compliance control verification
         - Incident response readiness
         - Security recommendations
      4. Document any residual risks
      5. Get security/compliance sign-off
      Verify all security and compliance requirements met before proceeding to Phase 8.
    parallel_group: "c"
    timeout_minutes: 90
