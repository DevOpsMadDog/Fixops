name: "Load Testing + Performance"
description: "k6 load tests, connection pooling, caching, query optimization"
days: "22-28"
tasks:
  - id: "6.1"
    name: "Implement database connection pooling"
    prompt: |
      In ~/Fixops/suite-core/database/, create connection pool optimization:
      1. Configure SQLAlchemy connection pool:
         - Pool size: 20 (dev), 100 (prod)
         - Max overflow: 40
         - Pool recycle: 3600s (prevent stale connections)
         - Pool pre-ping: true (verify connections alive)
      2. Implement connection monitoring:
         - Track active/idle connections
         - Alert if pool exhausted
         - Log slow connection acquires
      3. Add health check queries:
         - SELECT 1 to verify DB connectivity
         - Run every 5 minutes
      4. Create connection pool metrics:
         - Active connections
         - Idle connections
         - Wait time for new connection
      5. Write tests in suite-core/tests/test_connection_pool.py
      Load test with 100+ concurrent connections; verify no connection timeouts.
    parallel_group: "a"
    timeout_minutes: 50

  - id: "6.2"
    name: "Add caching layer (Redis)"
    prompt: |
      In ~/Fixops/suite-core/cache/, create caching infrastructure:
      1. Set up Redis client with connection pooling
      2. Implement CacheManager with:
         - get(key), set(key, value, ttl)
         - delete(key), clear_pattern(pattern)
         - incr(key), expire(key, ttl)
      3. Add cache layers:
         - Query result cache (TrustGraph queries): TTL 5min
         - Connector credential cache: TTL 1hr
         - AI prompt cache (for repeated queries): TTL 24hr
         - User permission cache: TTL 30min
      4. Implement cache invalidation:
         - On data write, invalidate relevant caches
         - Wildcard pattern matching
      5. Add cache statistics:
         - Hit rate, miss rate
         - Cache size
         - Eviction count
      6. Create cache warming for hot data
      7. Write tests in suite-core/tests/test_caching.py
      Test caching with various access patterns; verify hit rates >70% for read-heavy workloads.
    parallel_group: "a"
    timeout_minutes: 60

  - id: "6.3"
    name: "Optimize database queries"
    prompt: |
      In ~/Fixops/suite-core/database/, optimize queries:
      1. Add database indices:
         - TrustNodes: (tenant_id, type, created_at)
         - TrustEdges: (tenant_id, source_id, target_id)
         - Connectors: (tenant_id, status)
         - SyncJobs: (tenant_id, connector_id, status, created_at)
      2. Implement query optimization:
         - Use EXPLAIN ANALYZE to find slow queries
         - Add missing indices
         - Rewrite inefficient queries (N+1 prevention)
      3. Create query performance baseline:
         - List all queries with execution time
         - Identify slow queries (>100ms)
         - Set performance targets (<50ms p95)
      4. Implement prepared statements for common queries
      5. Add query result pagination (limit 100 default)
      6. Write tests in suite-core/tests/test_query_optimization.py
      Run load test; verify all queries meet performance targets.
    parallel_group: "a"
    timeout_minutes: 60

  - id: "6.4"
    name: "Implement materialized views for reports"
    prompt: |
      In ~/Fixops/suite-core/reporting/, create materialized views:
      1. Define materialized views for common reports:
         - TrustGraphNodeCount: count nodes by type
         - SyncJobStats: sync count, error rate, avg duration
         - ConnectorStatus: active connectors, last sync time
         - AiQueryStats: queries per hour, cost, popular query types
      2. Implement refresh schedule:
         - Real-time views: refresh every minute
         - Historical views: refresh every hour
         - Archive views: refresh daily
      3. Create view management:
         - List all materialized views
         - Trigger manual refresh
         - Monitor refresh duration
      4. Add view definitions to database migrations
      5. Write tests in suite-core/tests/test_materialized_views.py
      Test view creation, refresh, and query performance.
    parallel_group: "b"
    timeout_minutes: 50

  - id: "6.5"
    name: "Build comprehensive load testing suite (k6)"
    prompt: |
      In ~/Fixops/tests/load/, create k6 load test suite:
      1. Create load-test.js with scenarios:
         - Scenario 1: Gradual ramp (0->100 VUs over 5min, sustain 10min)
         - Scenario 2: Spike (50 VUs constant, spike to 200 VUs for 30s)
         - Scenario 3: Soak (10 VUs running 1 hour)
      2. Test endpoints:
         - GET /api/connectors (list)
         - GET /api/trustgraph/nodes (query)
         - POST /api/sync/run (trigger sync)
         - POST /ai/query (AI query)
         - GET /reports/dashboard (load report)
      3. Assertions for each scenario:
         - Error rate <0.1%
         - p95 latency: <500ms for list/query, <2s for sync/AI
         - No memory leaks (check with monitoring)
      4. Generate HTML report with pass/fail
      5. Create k6 cloud integration for continuous monitoring
      Run load tests; verify system meets performance SLAs under load.
    parallel_group: "b"
    timeout_minutes: 120

  - id: "6.6"
    name: "Implement API response compression"
    prompt: |
      In ~/Fixops/suite-core/api/, add compression middleware:
      1. Enable gzip compression:
         - Compress responses >1KB
         - Compression level 6 (balance speed/ratio)
      2. Add response header: Content-Encoding: gzip
      3. Support client header: Accept-Encoding: gzip, deflate
      4. Create compression metrics:
         - Bytes saved by compression
         - Compression ratio (%)
         - Time spent compressing
      5. Benchmark: verify compression reduces response size by 60-80%
      6. Write tests in suite-core/tests/test_compression.py
      Load test with compression enabled; verify bandwidth savings.
    parallel_group: "b"
    timeout_minutes: 40

  - id: "6.7"
    name: "Build database replication and failover"
    prompt: |
      In ~/Fixops/deploy/, set up database high availability:
      1. Configure PostgreSQL streaming replication:
         - Primary node (write)
         - 2 replica nodes (read-only)
         - Synchronous replication for critical writes
      2. Implement automated failover:
         - Monitor primary health (heartbeat)
         - Promote replica to primary if primary fails
         - Automatic DNS update to point to new primary
      3. Create failover testing:
         - Kill primary, verify replica promotion
         - Test read/write after failover
         - Measure failover time (target: <30s)
      4. Document failover procedures
      5. Create monitoring alerts for replication lag
      Test failover with simulated primary failure.
    parallel_group: "b"
    timeout_minutes: 70

  - id: "6.8"
    name: "Implement API gateway and rate limiting"
    prompt: |
      In ~/Fixops/deploy/, set up API gateway (nginx/Envoy):
      1. Create reverse proxy configuration:
         - Route requests to backend services
         - Load balance across instances
         - SSL termination
      2. Add rate limiting:
         - Per-user: 100 req/min
         - Per-endpoint: /sync (10 req/min), /ai (20 req/min)
         - Per-IP: 1000 req/min (with whitelist for known IPs)
      3. Add caching headers:
         - Cache-Control for public data
         - ETag for conditional requests
      4. Implement request/response logging
      5. Add monitoring for gateway health
      Test gateway with various load patterns.
    parallel_group: "c"
    timeout_minutes: 60

  - id: "6.9"
    name: "Create performance monitoring dashboard"
    prompt: |
      In ~/Fixops/suite-frontend/src/admin/, create PerformanceDashboard.tsx:
      1. Real-time metrics:
         - Request latency (p50, p95, p99)
         - Throughput (req/sec)
         - Error rate
         - Cache hit rate
      2. Resource utilization:
         - CPU, memory (backend and DB)
         - Database connections in use
         - Redis memory usage
      3. Database metrics:
         - Query count by endpoint
         - Slow queries (>100ms)
         - Connection pool status
      4. AI metrics:
         - Queries per hour
         - Cost per query
         - Model usage breakdown
      5. Add alerting thresholds
      6. Export metrics as CSV
      Verify dashboard updates in real-time with actual metrics.
    parallel_group: "c"
    timeout_minutes: 50

  - id: "6.10"
    name: "Performance optimization documentation and reporting"
    prompt: |
      Create comprehensive performance documentation:
      1. In ~/Fixops/docs/, create performance.md:
         - Caching strategy and effectiveness
         - Database optimization techniques
         - Load test results and SLAs
         - Scaling recommendations (horizontal/vertical)
      2. Create performance_tuning.md:
         - How to identify performance bottlenecks
         - Common optimization techniques
         - Profiling tools and how to use them
      3. Generate phase_6_performance_report.md with:
         - Before/after load test comparison
         - Optimization techniques applied
         - Performance gains achieved
         - Remaining optimization opportunities
      4. Create runbook for handling performance incidents
      Verify documentation is complete and accurate.
    parallel_group: "c"
    timeout_minutes: 40
